<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kingmaker Gold</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --dark: #05070a;
            --dark-2: #0b1018;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 215, 0, 0.15);
        }
        * { box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 50% 0%, #1a1f2e 0%, var(--dark) 40%);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
       .login-card {
            width: 100%;
            max-width: 400px;
            background: linear-gradient(145deg, var(--glass), rgba(255,255,255,0.02));
            backdrop-filter: blur(10px);
            padding: 40px 30px;
            border-radius: 24px;
            border: 1px solid var(--glass-border);
            box-shadow: 0 8px 32px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            text-align: center;
        }
       .logo {
            font-size: 36px;
            font-weight: 900;
            margin: 0 0 8px 0;
            background: linear-gradient(180deg, var(--gold) 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
       .subtitle { color: #9ca3af; font-size: 14px; margin-bottom: 30px; }

       .tab-group {
            display: flex;
            background: var(--dark-2);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 24px;
        }
       .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #9ca3af;
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
       .tab-btn.active {
            background: var(--gold);
            color: #000;
        }

       .input-group { margin-bottom: 16px; text-align: left; }
       .input-label { font-size: 13px; color: #9ca3af; font-weight: 600; margin-bottom: 6px; display: block; }
       .input-field {
            background: var(--dark-2);
            border: 1px solid var(--gold-dark);
            color: white;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            font-weight: 600;
            font-size: 15px;
            outline: none;
        }
       .input-field:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(255,215,0,0.1); }

       .action-btn {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            border: none;
            cursor: pointer;
            background: linear-gradient(135deg, var(--gold), var(--gold-dark));
            color: #000;
            margin-top: 10px;
            box-shadow: 0 4px 15px rgba(218,165,32,0.3);
        }
       .action-btn:active { transform: scale(0.98); }
       .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

       .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            color: #9ca3af;
            font-size: 13px;
        }
       .divider::before,.divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--glass-border);
        }
       .divider span { padding: 0 12px; }

       .google-btn {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            background: var(--dark-2);
            color: white;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
       .google-btn:active { transform: scale(0.98); }

       .guest-link {
            display: block;
            margin-top: 20px;
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
        }
       .guest-link:hover { color: var(--gold); }

       .swal2-popup {
            background: var(--dark-2)!important;
            color: white!important;
            border: 1px solid var(--glass-border)!important;
            border-radius: 20px!important;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1 class="logo">👑 KINGMAKER</h1>
        <p class="subtitle">Play & Win Real Cash</p>

        <div class="tab-group">
            <button class="tab-btn active" onclick="switchTab('login')">LOGIN</button>
            <button class="tab-btn" onclick="switchTab('signup')">SIGN UP</button>
        </div>

        <div id="loginForm">
            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" id="loginEmail" class="input-field" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="loginPassword" class="input-field" placeholder="••••••••">
            </div>
            <button class="action-btn" id="loginBtn" onclick="login()">LOGIN NOW</button>
        </div>

        <div id="signupForm" style="display:none">
            <div class="input-group">
                <label class="input-label">Email</label>
                <input type="email" id="signupEmail" class="input-field" placeholder="your@email.com">
            </div>
            <div class="input-group">
                <label class="input-label">Password</label>
                <input type="password" id="signupPassword" class="input-field" placeholder="Min 6 characters">
            </div>
            <div class="input-group">
                <label class="input-label">Confirm Password</label>
                <input type="password" id="signupConfirm" class="input-field" placeholder="••••••••">
            </div>
            <button class="action-btn" id="signupBtn" onclick="signup()">CREATE ACCOUNT</button>
        </div>

        <div class="divider"><span>OR</span></div>

        <button class="google-btn" onclick="loginWithGoogle()">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="20">
            Continue with Google
        </button>

        <a href="index.html" class="guest-link">Continue as Guest →</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);
    const provider = new GoogleAuthProvider();

    // Agar already logged in hai to game pe bhej do
    onAuthStateChanged(auth, user => {
        if (user) {
            window.location.href = "index.html";
        }
    });

    window.switchTab = (tab) => {
        if (tab === 'login') {
            document.getElementById('loginForm').style.display = 'block';
            document.getElementById('signupForm').style.display = 'none';
            document.querySelectorAll('.tab-btn')[0].classList.add('active');
            document.querySelectorAll('.tab-btn')[1].classList.remove('active');
        } else {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('signupForm').style.display = 'block';
            document.querySelectorAll('.tab-btn')[0].classList.remove('active');
            document.querySelectorAll('.tab-btn')[1].classList.add('active');
        }
    }

    window.login = async () => {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const btn = document.getElementById('loginBtn');

        if (!email ||!password) return Swal.fire("Error", "Email/Password required", "error");

        btn.disabled = true;
        btn.innerText = "LOGGING IN...";

        try {
            await signInWithEmailAndPassword(auth, email, password);
            Swal.fire("Success!", "Login successful", "success").then(() => {
                window.location.href = "index.html";
            });
        } catch (error) {
            Swal.fire("Login Failed", error.message, "error");
            btn.disabled = false;
            btn.innerText = "LOGIN NOW";
        }
    }

    window.signup = async () => {
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const confirm = document.getElementById('signupConfirm').value;
        const btn = document.getElementById('signupBtn');

        if (!email ||!password) return Swal.fire("Error", "Email/Password required", "error");
        if (password.length < 6) return Swal.fire("Error", "Password must be 6+ characters", "error");
        if (password!== confirm) return Swal.fire("Error", "Passwords don't match", "error");

        btn.disabled = true;
        btn.innerText = "CREATING...";

        try {
            const userCred = await createUserWithEmailAndPassword(auth, email, password);
            // New user ke liye balance 0 set karo
            await set(ref(db, `users/${userCred.user.uid}`), {
                email: email,
                balance: 0,
                createdAt: Date.now()
            });
            Swal.fire("Success!", "Account created! Rs. 10 bonus added", "success").then(() => {
                window.location.href = "index.html";
            });
        } catch (error) {
            Swal.fire("Signup Failed", error.message, "error");
            btn.disabled = false;
            btn.innerText = "CREATE ACCOUNT";
        }
    }

    window.loginWithGoogle = async () => {
        try {
            const result = await signInWithPopup(auth, provider);
            // Check karo new user hai ya old
            const userRef = ref(db, `users/${result.user.uid}`);
            const snap = await get(userRef);
            if (!snap.exists()) {
                await set(userRef, {
                    email: result.user.email,
                    balance: 0,
                    createdAt: Date.now()
                });
            }
            Swal.fire("Success!", "Login successful", "success").then(() => {
                window.location.href = "index.html";
            });
        } catch (error) {
            Swal.fire("Google Login Failed", error.message, "error");
        }
    }
</script>
</body>
</html>
