<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wallet</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;padding:20px;margin:0;text-align:center}
.box{background:#0b1018;border:1px solid #b8860b;padding:20px;border-radius:12px;margin:10px 0}
h1{color:#ffd700}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;font-size:16px}
button{background:#ffd700;color:#000;font-weight:900;cursor:pointer}
.bal{font-size:32px;font-weight:900;color:#ffd700;margin:10px 0}
.tab{display:flex;gap:8px;margin:20px 0}
.tab button{flex:1;background:#000;color:#999}
.tab button.active{background:#ffd700;color:#000}
.num{color:#10b981;font-weight:900;font-size:22px;background:#000;padding:12px;border-radius:8px;border:1px solid #10b981}
</style>
</head>
<body>
<div class="box">
<h1>💰 WALLET</h1>
<div class="bal">Rs. <span id="bal">0</span></div>
<button onclick="location.href='./index.html'">BACK TO GAME</button>
</div>

<div class="tab">
<button id="depBtn" class="active" onclick="showTab('dep')">DEPOSIT</button>
<button id="withBtn" onclick="showTab('with')">WITHDRAW</button>
</div>

<div id="depBox" class="box">
<h3>💳 Deposit</h3>
<p>Send to Admin Number:</p>
<div class="num" id="adminNum" style="color:#ffd700;border-color:#ffd700">Loading...</div>
<input id="depAmt" type="number" placeholder="Amount (Min 100)" min="100">
<input id="trxId" placeholder="Transaction ID">
<button onclick="reqDeposit()">SUBMIT DEPOSIT</button>
</div>

<div id="withBox" class="box" style="display:none">
<h3>💸 Withdraw</h3>
<p>Your Saved Number:</p>
<div class="num" id="userNum">Loading...</div>
<input id="withAmt" type="number" placeholder="Amount (Min 100)" min="100">
<button onclick="reqWithdraw()">SUBMIT WITHDRAW</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,onValue,push,update}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",authDomain:"kingmaker-crash.firebaseapp.com",databaseURL:"https://kingmaker-crash-default-rtdb.firebaseio.com",projectId:"kingmaker-crash",storageBucket:"kingmaker-crash.firebasestorage.app",messagingSenderId:"327400668393",appId:"1:327400668393:web:0d02a340b9f5603f524478"});
const auth=getAuth(app),db=getDatabase(app);
let ub=0,userNum="",adminNum="";

onAuthStateChanged(auth,u=>{
if(!u)return location.replace("./login.html");
onValue(ref(db,`users/${u.uid}/balance`),s=>{ub=s.val()||0;document.getElementById('bal').innerText=ub.toLocaleString()});
onValue(ref(db,`users/${u.uid}/withdraw_number`),s=>{userNum=s.val()||"Not Set";document.getElementById('userNum').innerText=userNum});
onValue(ref(db,'admin/payment_info'),s=>{adminNum=s.val()||"Not Set";document.getElementById('adminNum').innerText=adminNum});
});

window.showTab=t=>{
document.getElementById('depBox').style.display=t==='dep'?'block':'none';
document.getElementById('withBox').style.display=t==='with'?'block':'none';
document.getElementById('depBtn').classList.toggle('active',t==='dep');
document.getElementById('withBtn').classList.toggle('active',t==='with');
};

window.reqDeposit=async()=>{
let a=parseFloat(document.getElementById('depAmt').value),tr=document.getElementById('trxId').value;
if(!a||a<100)return Swal.fire("Error","Min 100","error");
if(!tr)return Swal.fire("Error","Transaction ID daalo","error");
await push(ref(db,'requests'),{uid:auth.currentUser.uid,email:auth.currentUser.email,type:'deposit',amount:a,trx:tr,admin_number:adminNum,status:'pending',timestamp:Date.now()});
Swal.fire("Sent!","Request sent","success");
document.getElementById('depAmt').value='';document.getElementById('trxId').value='';
};

window.reqWithdraw=async()=>{
let a=parseFloat(document.getElementById('withAmt').value);
if(!a||a<100)return Swal.fire("Error","Min 100","error");
if(a>ub)return Swal.fire("Error","Balance kam hai","error");
if(userNum==="Not Set"||userNum==="Loading...")return Swal.fire("Error","Index page pe jaake number save karo","error");
await update(ref(db,`users/${auth.currentUser.uid}`),{balance:ub-a});
await push(ref(db,'requests'),{uid:auth.currentUser.uid,email:auth.currentUser.email,type:'withdraw',amount:a,user_number:userNum,status:'pending',timestamp:Date.now()});
Swal.fire("Sent!","Withdraw request sent","success");
document.getElementById('withAmt').value='';
};
</script>
</body>
</html>
