<!DOCTYPE html>
<html>
<head><title>Wallet</title></head>
<body style="text-align:center; padding:50px; font-family:sans-serif;">
    <div style="background:white; padding:30px; border-radius:20px; box-shadow:0 0 20px #ccc; display:inline-block;">
        <h2>Wallet Request</h2>
        <input type="number" id="amt" placeholder="Amount" style="padding:10px; margin:10px;"><br>
        <button id="depBtn" style="background:green; color:white; padding:10px;">Deposit</button>
        <button id="withBtn" style="background:red; color:white; padding:10px;">Withdraw</button>
        <p><a href="index.html">Go Back</a></p>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Same as index.html */ };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const makeRequest = (type) => {
        const u = auth.currentUser;
        const val = document.getElementById('amt').value;
        if(!u || !val) return alert("Login/Amount missing");

        push(ref(db, 'requests'), {
            uid: u.uid,
            email: u.email,
            amount: parseFloat(val),
            type: type,
            status: 'pending'
        }).then(() => alert("Request Sent!"));
    };

    document.getElementById('depBtn').onclick = () => makeRequest('deposit');
    document.getElementById('withBtn').onclick = () => makeRequest('withdraw');
</script>
</body>
</html>
