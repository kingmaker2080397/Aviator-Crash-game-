<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Gold - Pro Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;800&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #ffd700; --dark: #05070a; --glass: rgba(255, 255, 255, 0.08); }
        body { background: var(--dark); color: white; font-family: 'Outfit', sans-serif; margin: 0; display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .app { width: 100%; max-width: 420px; padding: 20px; text-align: center; }
        
        .header { background: var(--glass); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bal-box { text-align: left; }
        .bal-label { font-size: 12px; color: #bbb; display: block; }
        .bal-val { font-size: 20px; font-weight: 800; color: var(--gold); }

        .bet-section { margin: 15px 0; background: var(--glass); padding: 10px; border-radius: 12px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .bet-input { background: #1a1f2e; border: 1px solid var(--gold); color: white; padding: 8px; border-radius: 8px; width: 80px; text-align: center; font-weight: bold; }

        .wheel-container { position: relative; width: 320px; height: 320px; margin: 20px auto; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #1a1f2e; transition: transform 5s cubic-bezier(0.15, 0, 0.15, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 45px; z-index: 100; filter: drop-shadow(0 0 10px gold); }

        .spin-btn { background: linear-gradient(135deg, var(--gold), #b8860b); color: #000; width: 100%; padding: 18px; border-radius: 15px; font-size: 22px; font-weight: 800; border: none; cursor: pointer; box-shadow: 0 10px 20px rgba(218,165,32,0.3); }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .btn-action { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 15px; border-radius: 15px; cursor: pointer; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="bal-box">
            <span class="bal-label">TOTAL BALANCE</span>
            <span class="bal-val">Rs. <span id="userBal">0</span></span>
        </div>
        <button onclick="logout()" style="background:none; border:none; color:#ff4d4d; font-weight:bold; cursor:pointer;">LOGOUT</button>
    </div>

    <div class="bet-section">
        <span>Enter Bet:</span>
        <input type="number" id="betAmount" class="bet-input" value="10">
    </div>

    <div class="wheel-container">
        <img src="https://cdn-icons-png.flaticon.com/512/8155/8155940.png" class="pointer">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN NOW</button>

    <div class="grid">
        <button class="btn-action" onclick="showDeposit()">💰 Deposit</button>
        <button class="btn-action" onclick="showWithdraw()">💸 Withdraw</button>
        <button class="btn-action" onclick="showKYC()">🆔 KYC</button>
        <button class="btn-action" onclick="invite()">📩 Invite</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, set, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // Wheel Values (Exactly as shown in your screenshot)
    const segments = ["2", "100", "5", "5", "1000", "5000", "20", "1000"];
    const colors = ["#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e"];
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");

    function drawWheel() {
        const ang = (Math.PI * 2) / segments.length;
        segments.forEach((val, i) => {
            ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(250,250);
            ctx.arc(250,250,250, i*ang, (i+1)*ang); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*ang + ang/2);
            ctx.fillStyle = colors[i]=="#ffd700"?"#000":"#fff"; ctx.font="bold 35px Outfit";
            ctx.fillText(val, 130, 10); ctx.restore();
        });
    }
    drawWheel();

    let currentRotation = 0;
    let userBalance = 0;

    onAuthStateChanged(auth, user => {
        if(user) {
            onValue(ref(db, `users/${user.uid}/balance`), s => {
                userBalance = s.val() || 0;
                document.getElementById("userBal").innerText = userBalance;
            });
        }
    });

    document.getElementById("spinBtn").onclick = async function() {
        const bet = parseFloat(document.getElementById("betAmount").value);
        if(bet > userBalance) return Swal.fire("Error", "Balance kam hai!", "error");
        if(bet < 1) return Swal.fire("Error", "Sahi amount likho!", "error");

        this.disabled = true;

        // Loss Proof & Rigged Logic
        const nextResSnap = await get(ref(db, 'admin/next_result'));
        let winValue;

        if(nextResSnap.exists() && nextResSnap.val()) {
            winValue = nextResSnap.val().toString();
            set(ref(db, 'admin/next_result'), null);
        } else {
            // Anti-Loss: If bet > 20, give Rs. 2 or 5
            const safeResults = ["2", "5"];
            winValue = (bet >= 20) ? safeResults[Math.floor(Math.random()*2)] : segments[Math.floor(Math.random()*segments.length)];
        }

        // Calculate exact rotation
        const targetIndex = segments.indexOf(winValue);
        const segmentDeg = 360 / segments.length;
        // Logic to stop arrow at the center of targetIndex
        const stopAt = (360 - (targetIndex * segmentDeg)) - (segmentDeg / 2);
        currentRotation += (3600 + stopAt);
        
        canvas.style.transform = `rotate(${currentRotation}deg)`;

        // Deduct Bet
        update(ref(db, `users/${auth.currentUser.uid}`), { balance: userBalance - bet });

        setTimeout(() => {
            Swal.fire('WINNER!', `Aap Rs.${winValue} Jeet gaye!`, 'success');
            push(ref(db, 'requests'), { 
                uid: auth.currentUser.uid, 
                email: auth.currentUser.email, 
                amount: winValue, 
                status: 'pending', 
                type: 'Win' 
            });
            this.disabled = false;
        }, 5000);
    };

    // Functional Buttons
    window.showDeposit = async () => {
        const snap = await get(ref(db, 'admin/payment_info'));
        const num = snap.val() || "0300-0000000";
        Swal.fire({ title: 'Deposit', text: `Is number par payment bhejein: ${num}`, icon: 'info' });
    };
    window.showWithdraw = () => Swal.fire('Withdraw', 'Min Rs. 500 balance hona chahiye.', 'warning');
    window.showKYC = () => Swal.fire('KYC', 'Apna ID Card upload karein (Feature Coming Soon)', 'info');
    window.invite = () => navigator.share({ title: 'Kingmaker', text: 'Play & Win!', url: window.location.href });
    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
