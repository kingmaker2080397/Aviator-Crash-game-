<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Gold - Spin & Win</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #ffd700; --dark-bg: #0b0f1a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        
        /* Premium Glass Card */
        .header-card { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,215,0,0.2); display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .balance-box { font-size: 18px; font-weight: bold; color: var(--gold); }
        
        /* 3D Wheel Design */
        .wheel-box { position: relative; width: 320px; height: 320px; margin: auto; border: 10px solid #1a1f2e; border-radius: 50%; box-shadow: 0 0 50px rgba(0,0,0,0.8), 0 0 20px rgba(255,215,0,0.1); }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -25px; left: 50%; transform: translateX(-50%); width: 50px; z-index: 10; filter: drop-shadow(0 5px 10px black); }

        /* Action Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 30px; }
        .action-btn { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 12px; border-radius: 12px; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .action-btn:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
        
        .spin-btn { background: linear-gradient(135deg, #ffd700, #b8860b); color: black; width: 100%; padding: 18px; border-radius: 15px; font-size: 20px; font-weight: bold; border: none; margin-top: 25px; cursor: pointer; box-shadow: 0 10px 20px rgba(255, 215, 0, 0.2); }
        .spin-btn:disabled { opacity: 0.5; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-card">
        <div class="balance-box">💰 Rs. <span id="balanceDisplay">0</span></div>
        <button class="action-btn" onclick="authAction('logout')" style="border-color:#ff4d4d; color:#ff4d4d;">Logout</button>
    </div>

    <div class="wheel-box">
        <img src="https://cdn-icons-png.flaticon.com/512/8155/8155940.png" class="pointer">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN TO WIN</button>

    <div class="btn-grid">
        <button class="action-btn" onclick="socialAction('invite')">📩 Invite Friends</button>
        <button class="action-btn" onclick="socialAction('share')">🔗 Share App</button>
        <button class="action-btn" onclick="window.location.href='wallet.html'">💳 Wallet</button>
        <button class="action-btn" onclick="authAction('login')">👤 Profile</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const segments = ["5", "1000", "5000", "20", "1000", "2", "100", "5"];
    const colors = ["#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700"];

    function drawWheel() {
        const segAngle = (2 * Math.PI) / segments.length;
        segments.forEach((text, i) => {
            ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(250, 250);
            ctx.arc(250, 250, 245, i * segAngle, (i + 1) * segAngle);
            ctx.fill(); ctx.save(); ctx.translate(250, 250); ctx.rotate(i * segAngle + segAngle / 2);
            ctx.fillStyle = colors[i] === "#ffd700" ? "black" : "white";
            ctx.font = "bold 25px Arial"; ctx.fillText("Rs." + text, 120, 10); ctx.restore();
        });
    }
    drawWheel();

    let rotation = 0;
    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = "login.html";
        onValue(ref(db, `users/${user.uid}/balance`), s => {
            document.getElementById("balanceDisplay").innerText = s.val() || 0;
        });
    });

    document.getElementById("spinBtn").onclick = function() {
        this.disabled = true;
        const extraDeg = Math.floor(Math.random() * 360) + 3600;
        rotation += extraDeg;
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            const actualRot = rotation % 360;
            const index = Math.floor(((360 - (actualRot % 360) + 270) % 360) / 45);
            const win = segments[index];

            Swal.fire({
                title: 'Congratulations!',
                text: `You won Rs.${win}`,
                imageUrl: 'https://cdn-icons-png.flaticon.com/512/2489/2489756.png',
                imageWidth: 100,
                confirmButtonColor: '#ffd700',
                confirmButtonText: 'Claim Now'
            }).then(() => {
                push(ref(db, 'requests'), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    amount: win,
                    status: 'pending',
                    type: 'Game Win',
                    timestamp: Date.now()
                });
            });
            this.disabled = false;
        }, 5000);
    };

    window.socialAction = (type) => {
        const text = "Join Kingmaker Gold & Win Daily! Link: https://r2080397.github.io/";
        if(type === 'share') navigator.share({ title: 'Kingmaker', text: text, url: window.location.href });
        else alert("Invite Link Copied!");
    };

    window.authAction = (type) => {
        if(type === 'logout') signOut(auth).then(() => window.location.reload());
    };
</script>
</body>
</html>
