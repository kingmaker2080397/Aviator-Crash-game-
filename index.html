     .container {

   .multiplier-display {

<body>
    <div class="container">
        <div class="demo-badge">✈️ MOON CRASH PRO DEMO</div>
        <h2>MOON CRASH</h2>

        <div class="game-body">
            <div class="stats">
                <div>COINS: <b id="balance">1000</b></div>
                <div>WIN: <b id="lastWin">0</b></div>
            </div>

            <div class="graph-container">
                <canvas id="graph"></canvas>
                <div class="plane" id="plane">✈️</div>
                <div class="multiplier-display">
                    <div class="multiplier" id="multiplier">1.00x</div>
                    <div class="status-text" id="status">PLACE YOUR BET</div>
                </div>
            </div>

            <div class="bet-section">
                <input type="number" id="betAmount" placeholder="Bet" value="50" min="10" max="500">
                <input type="number" id="autoCashout" placeholder="Auto" value="2.00" min="1.01" step="0.01">
            </div>

            <button class="btn btn-bet" id="betBtn">PLACE BET</button>
            <button class="btn btn-cashout" id="cashoutBtn" disabled>CASH OUT</button>

            <div class="history" id="history"></div>
        </div>
    </div>

<script>
    let coins = 1000;
    let currentBet = 0;
    let isPlaying = false;
    let isCrashed = false;
    let currentMultiplier = 1.00;
    let gameInterval;
    let crashPoint = 0;
    let hasCashedOut = false;

    const balanceEl = document.getElementById('balance');
    const lastWinEl = document.getElementById('lastWin');
    const multiplierEl = document.getElementById('multiplier');
    const statusEl = document.getElementById('status');
    const betBtn = document.getElementById('betBtn');
    const cashoutBtn = document.getElementById('cashoutBtn');
    const betAmountEl = document.getElementById('betAmount');
    const autoCashoutEl = document.getElementById('autoCashout');
    const historyEl = document.getElementById('history');
    const canvas = document.getElementById('graph');
    const ctx = canvas.getContext('2d');
    const planeEl = document.getElementById('plane');

    function resizeCanvas() {
        canvas.width = canvas.offsetWidth * 2;
        canvas.height = canvas.offsetHeight * 2;
        ctx.scale(2, 2);
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    // Audio Engine
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let engineSound;

    function startEngineSound() {
        engineSound = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        const filter = audioCtx.createBiquadFilter();
        engineSound.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        engineSound.type = 'sawtooth';
        engineSound.frequency.value = 80;
        filter.type = 'lowpass';
        filter.frequency.value = 400;
        gain.gain.setValueAtTime(0.03, audioCtx.currentTime);
        engineSound.start();
    }

    function updateEngineSound() {
        if(engineSound) {
            engineSound.frequency.exponentialRampToValueAtTime(
                80 + (currentMultiplier * 20),
                audioCtx.currentTime + 0.1
            );
        }
    }

    function stopEngineSound() {
        if(engineSound) {
            engineSound.stop();
            engineSound = null;
        }
    }

    function playCrashSound() {
        const bufferSize = audioCtx.sampleRate * 0.5;
        const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
        const data = buffer.getChannelData(0);
        for(let i = 0; i < bufferSize; i++) {
            data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufferSize, 2);
        }
        const noise = audioCtx.createBufferSource();
        noise.buffer = buffer;
        const filter = audioCtx.createBiquadFilter();
        filter.type = 'lowpass';
        filter.frequency.value = 800;
        const gain = audioCtx.createGain();
        gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(audioCtx.destination);
        noise.start();
    }

    function playCashoutSound() {
        [1046, 1318, 1568].forEach((freq, i) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0, audioCtx.currentTime + i * 0.08);
            gain.gain.linearRampToValueAtTime(0.25, audioCtx.currentTime + i * 0.08 + 0.03);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + i * 0.08 + 0.25);
            osc.start(audioCtx.currentTime + i * 0.08);
            osc.stop(audioCtx.currentTime + i * 0.08 + 0.25);
        });
    }

    // Graph + Plane
    let pathPoints = [];
    function drawGraph() {
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        ctx.clearRect(0, 0, w, h);

        // Grid
        ctx.strokeStyle = 'rgba(139, 185, 255, 0.08)';
        ctx.lineWidth = 1;
        for(let i = 0; i < w; i += 40) {
            ctx.beginPath();
            ctx.moveTo(i, 0);
            ctx.lineTo(i, h);
            ctx.stroke();
        }
        for(let i = 0; i < h; i += 40) {
            ctx.beginPath();
            ctx.moveTo(0, i);
            ctx.lineTo(w, i);
            ctx.stroke();
        }

        // Flight path with glow
        if(pathPoints.length > 1) {
            const gradient = ctx.createLinearGradient(0, 0, w, 0);
            gradient.addColorStop(0, 'rgba(139, 185, 255, 0.2)');
            gradient.addColorStop(1, isCrashed? '#ff3b3b' : '#8bb9ff');

            ctx.strokeStyle = gradient;
            ctx.lineWidth = 4;
            ctx.shadowBlur = 20;
            ctx.shadowColor = isCrashed? '#ff3b3b' : '#8bb9ff';
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';

            ctx.beginPath();
            ctx.moveTo(pathPoints[0].x, pathPoints[0].y);
            for(let i = 1; i < pathPoints.length; i++) {
                const xc = (pathPoints[i].x + pathPoints[i-1].x) / 2;
                const yc = (pathPoints[i].y + pathPoints[i-1].y) / 2;
                ctx.quadraticCurveTo(pathPoints[i-1].x, pathPoints[i-1].y, xc, yc);
            }
            ctx.stroke();
            ctx.shadowBlur = 0;
        }
    }

    function updatePlane() {
        const w = canvas.offsetWidth;
        const h = canvas.offsetHeight;
        if(pathPoints.length > 0) {
            const lastPoint = pathPoints[pathPoints.length - 1];
            planeEl.style.left = (lastPoint.x - 20) + 'px';
            planeEl.style.top = (lastPoint.y - 20) + 'px';

            // Rotate plane based on trajectory
            if(pathPoints.length > 1) {
                const prev = pathPoints[pathPoints.length - 2];
                const angle = Math.atan2(lastPoint.y - prev.y, lastPoint.x - prev.x);
                planeEl.style.transform = `rotate(${angle}rad)`;
            }
        }
    }

    function generateCrashPoint() {
        const r = Math.random();
        if(r < 0.02) return 1.00;
        if(r < 0.10) return 1.01 + Math.random() * 0.5;
        return Math.max(1.00, (0.99 / (1 - r)) * 0.99);
    }

    function startGame() {
        const bet = parseInt(betAmountEl.value);
        if(bet < 10 || bet > coins) {
            Swal.fire({
                title: "Invalid Bet",
                text: `Min 10, Max ${coins}`,
                icon: "error",
                background: "#0b0f1e",
                color: "#e0f7ff",
                confirmButtonColor: "#8bb9ff"
            });
            return;
        }

        if (audioCtx.state === 'suspended') audioCtx.resume();

        coins -= bet;
        currentBet = bet;
        balanceEl.innerText = coins;
        isPlaying = true;
        isCrashed = false;
        hasCashedOut = false;
        currentMultiplier = 1.00;
        crashPoint = generateCrashPoint();
        pathPoints = [{x: 0, y: canvas.offsetHeight - 20}];

        betBtn.disabled = true;
        cashoutBtn.disabled = false;
        betAmountEl.disabled = true;
        autoCashoutEl.disabled = true;
        multiplierEl.classList.add('flying');
        multiplierEl.classList.remove('crashed');
        planeEl.classList.add('flying');
        planeEl.classList.remove('crashed');
        statusEl.innerText = 'TAKING OFF...';
        statusEl.style.color = '#8bb9ff';

        startEngineSound();

        let startTime = Date.now();
        gameInterval = setInterval(() => {
            const elapsed = (Date.now() - startTime) / 1000;
            currentMultiplier = 1 + Math.pow(elapsed, 1.85) * 0.12;

            // Update path - exponential curve
            const x = Math.min(elapsed * 70, canvas.offsetWidth - 30);
            const y = canvas.offsetHeight - 20 - (Math.pow(currentMultiplier - 1, 0.7) * 80);
            pathPoints.push({x, y});
            drawGraph();
            updatePlane();
            updateEngineSound();

            multiplierEl.innerText = currentMultiplier.toFixed(2) + 'x';

            // Auto cashout
            const autoCash = parseFloat(autoCashoutEl.value);
            if(!hasCashedOut && autoCash >= 1.01 && currentMultiplier >= autoCash) {
                cashOut();
            }

            // Crash
            if(currentMultiplier >= crashPoint) {
                crash();
            }
        }, 50);
    }

    function cashOut() {
        if(!isPlaying || hasCashedOut || isCrashed) return;

        hasCashedOut = true;
        const winAmount = Math.floor(currentBet * currentMultiplier);
        coins += winAmount;
        balanceEl.innerText = coins;
        lastWinEl.innerText = winAmount;

        playCashoutSound();
        statusEl.innerText = `CASHED OUT ${currentMultiplier.toFixed(2)}x!`;
        statusEl.style.color = '#00ff88';
        cashoutBtn.disabled = true;
        planeEl.classList.remove('flying');

        addHistory(currentMultiplier, true);
    }

    function crash() {
        clearInterval(gameInterval);
        stopEngineSound();
        isPlaying = false;
        isCrashed = true;

        playCrashSound();
        multiplierEl.classList.remove('flying');
        multiplierEl.classList.add('crashed');
        planeEl.classList.remove('flying');
        planeEl.classList.add('crashed');
        statusEl.innerText = `CRASHED AT ${crashPoint.toFixed(2)}x`;
        statusEl.style.color = '#ff3b3b';

        betBtn.disabled = false;
        cashoutBtn.disabled = true;
        betAmountEl.disabled = false;
        autoCashoutEl.disabled = false;

        if(!hasCashedOut) {
            html}
