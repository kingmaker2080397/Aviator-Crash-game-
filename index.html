<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>Aviator</h1>
            <div class="balance">Balance: <span id="balance">1000</span></div>
        </div>
        <div class="game-area">
            <div class="multiplier" id="multiplier">1.00x</div>
            <div class="controls">
                <input id="bet-amount" type="number" placeholder="Bet Amount" value="10">
                <button id="bet-button">Bet</button>
                <button id="cashout-button" disabled>Cashout</button>
            </div>
            <div class="result" id="result">Waiting...</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
