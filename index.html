<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Gold - Pro Casino</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-dark: #b8860b;
            --dark: #05070a;
            --dark-2: #0b1018;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 215, 0, 0.15);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: radial-gradient(circle at 50% 0%, #1a1f2e 0%, var(--dark) 40%);
            color: white;
            font-family: 'Outfit', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }
       .app { width: 100%; max-width: 420px; padding: 16px; text-align: center; }
       .header {
            background: linear-gradient(145deg, var(--glass), rgba(255,255,255,0.02));
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 16px 18px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
       .bal-box { text-align: left; }
       .bal-label { font-size: 11px; color: #9ca3af; display: block; letter-spacing: 1px; font-weight: 600; }
       .bal-val {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(180deg, var(--gold) 0%, #ffed4e 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
       .logout-btn {
            background: rgba(255,77,77,0.1);
            border: 1px solid rgba(255,77,77,0.3);
            color: #ff6b6b;
            font-weight: 700;
            cursor: pointer;
            padding: 8px 14px;
            border-radius: 10px;
            font-size: 12px;
        }
       .bet-section {
            margin: 20px 0;
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 14px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
       .bet-label { font-size: 14px; font-weight: 600; color: #d1d5db; }
       .bet-controls { display: flex; gap: 8px; align-items: center; }
       .bet-input {
            background: var(--dark-2);
            border: 1px solid var(--gold-dark);
            color: white;
            padding: 10px;
            border-radius: 10px;
            width: 90px;
            text-align: center;
            font-weight: 800;
            font-size: 16px;
            outline: none;
        }
       .chip-btn {
            background: rgba(255,215,0,0.1);
            border: 1px solid var(--gold-dark);
            color: var(--gold);
            padding: 6px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            cursor: pointer;
        }
       .wheel-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 24px auto;
            filter: drop-shadow(0 10px 40px rgba(255,215,0,0.15));
        }
        #wheelCanvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 10px solid #0d1117;
            box-shadow: 0 0 0 3px var(--gold-dark), 0 0 40px rgba(255,215,0,0.2);
            transition: transform 5s cubic-bezier(0.17, 0.67, 0.12, 0.99);
        }
       .wheel-center {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 50px; height: 50px;
            background: radial-gradient(circle, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 50%;
            border: 4px solid var(--dark);
            z-index: 10;
        }
       .pointer {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(180deg);
            width: 50px;
            z-index: 100;
            filter: drop-shadow(0 4px 12px rgba(255,215,0,0.8));
        }
       .spin-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: #000;
            width: 100%;
            padding: 18px;
            border-radius: 16px;
            font-size: 20px;
            font-weight: 900;
            border: none;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(218,165,32,0.4);
            letter-spacing: 1px;
        }
       .spin-btn:disabled { opacity: 0.5; cursor: not-allowed; }
       .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 24px; }
       .btn-action {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 16px 12px;
            border-radius: 14px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }
       .btn-icon { font-size: 20px; }
       .swal2-popup {
            background: var(--dark-2)!important;
            color: white!important;
            border: 1px solid var(--glass-border)!important;
            border-radius: 20px!important;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="bal-box">
            <span class="bal-label">TOTAL BALANCE</span>
            <span class="bal-val">Rs. <span id="userBal">0</span></span>
        </div>
        <button onclick="logout()" class="logout-btn">LOGOUT</button>
    </div>

    <div class="bet-section">
        <span class="bet-label">YOUR BET</span>
        <div class="bet-controls">
            <button class="chip-btn" onclick="addBet(10)">+10</button>
            <button class="chip-btn" onclick="addBet(50)">+50</button>
            <input type="number" id="betAmount" class="bet-input" value="10" min="1">
        </div>
    </div>

    <div class="wheel-container">
        <img src="https://cdn-icons-png.flaticon.com/512/8155/8155940.png" class="pointer">
        <div class="wheel-center"></div>
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN NOW</button>

    <div class="grid">
        <button class="btn-action" onclick="showDeposit()">
            <span class="btn-icon">💰</span>
            <span>Deposit</span>
        </button>
        <button class="btn-action" onclick="window.location.href='./wallet.html'">
            <span class="btn-icon">💸</span>
            <span>Withdraw</span>
        </button>
        <button class="btn-action" onclick="showKYC()">
            <span class="btn-icon">🆔</span>
            <span>KYC</span>
        </button>
        <button class="btn-action" onclick="invite()">
            <span class="btn-icon">📩</span>
            <span>Invite</span>
        </button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, set, get, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // FIX: Segments order - teer top pe hai, 0 index top se start
    const segments = ["2", "100", "5", "5", "1000", "5000", "20", "1000"];
    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const segmentDeg = 360 / segments.length;

    function drawWheel() {
        const ang = (Math.PI * 2) / segments.length;
        const gradientGold = ctx.createRadialGradient(250, 250, 100, 250, 250, 250);
        gradientGold.addColorStop(0, "#ffed4e");
        gradientGold.addColorStop(1, "#b8860b");

        segments.forEach((val, i) => {
            ctx.beginPath();
            ctx.fillStyle = i % 2 === 0? gradientGold : "#0d1117";
            ctx.moveTo(250,250);
            ctx.arc(250,250,250, i*ang - Math.PI/2, (i+1)*ang - Math.PI/2);
            ctx.fill();
            ctx.save();
            ctx.translate(250,250);
            ctx.rotate(i*ang + ang/2 - Math.PI/2);
            ctx.fillStyle = i % 2 === 0? "#000" : "#fff";
            ctx.font = "900 38px Outfit";
            ctx.textAlign = "center";
            ctx.fillText(val, 160, 12);
            ctx.restore();
        });
    }
    drawWheel();

    let currentRotation = 0;
    let userBalance = 0;
    let paymentNumber = "";

    onAuthStateChanged(auth, user => {
        if(user) {
            onValue(ref(db, `users/${user.uid}/balance`), s => {
                userBalance = s.val() || 0;
                document.getElementById("userBal").innerText = userBalance.toLocaleString();
            });
            onValue(ref(db, 'admin/payment_info'), s => {
                paymentNumber = s.val() || "Not Set";
            });
        } else {
            window.location.replace("./login.html");
        }
    });

    window.addBet = (amount) => {
        const input = document.getElementById("betAmount");
        input.value = parseInt(input.value) + amount;
    }

    window.showDeposit = () => {
        Swal.fire({
            title: '💰 Deposit Funds',
            html: `Send payment to this number:<br><br><b style="font-size:24px;color:#ffd700">${paymentNumber}</b><br><br>After payment, create request from Wallet page.`,
            icon: 'info',
            confirmButtonColor: '#ffd700',
            confirmButtonText: 'Go to Wallet'
        }).then((result) => {
            if(result.isConfirmed) {
                window.location.href = './wallet.html';
            }
        });
    }

    document.getElementById("spinBtn").onclick = async function() {
        const bet = parseFloat(document.getElementById("betAmount").value);
        if(!auth.currentUser) return Swal.fire("Error", "Login required!", "error");
        if(bet > userBalance) return Swal.fire("Insufficient Balance", "Balance kam hai!", "error");
        if(bet < 1) return Swal.fire("Invalid Bet", "Minimum bet Rs. 1 hai!", "error");

        this.disabled = true;
        this.innerText = "SPINNING...";

        await update(ref(db, `users/${auth.currentUser.uid}`), { balance: userBalance - bet });

        const nextResSnap = await get(ref(db, 'admin/next_result'));
        let winValue;

        if(nextResSnap.exists() && nextResSnap.val()) {
            winValue = nextResSnap.val().toString();
            await set(ref(db, 'admin/next_result'), null);
        } else {
            const safeResults = ["2", "5"];
            winValue = (bet >= 20)? safeResults[Math.floor(Math.random()*2)] : segments[Math.floor(Math.random()*segments.length)];
        }

        // FIX: Duplicate values handle karo - sab indexes dhundo
        const matchingIndexes = [];
        segments.forEach((val, idx) => {
            if(val === winValue) matchingIndexes.push(idx);
        });
        // Random index chuno agar multiple hain
        const targetIndex = matchingIndexes[Math.floor(Math.random() * matchingIndexes.length)];
        
        // FIX: Bilkul sahi angle pe ruko
        const stopAngle = 360 - (targetIndex * segmentDeg) - (segmentDeg / 2);
        const finalRotation = currentRotation + 3600 + stopAngle;
        currentRotation = finalRotation;

        canvas.style.transform = `rotate(${finalRotation}deg)`;

        setTimeout(async () => {
            const newBalance = userBalance - bet + parseFloat(winValue);
            await update(ref(db, `users/${auth.currentUser.uid}`), { balance: newBalance });
            
            Swal.fire({
                title: 'WINNER!',
                html: `You won <b style="color:#ffd700">Rs. ${winValue}</b><br>New Balance: <b>Rs. ${newBalance}</b>`,
                icon: 'success',
                confirmButtonColor: '#ffd700'
            });
            
            this.disabled = false;
            this.innerText = "SPIN NOW";
        }, 5000);
    };

    window.showKYC = () => Swal.fire({
        title: 'KYC Verification',
        text: 'CNIC front/back upload karein. Feature coming soon.',
        icon: 'info',
        confirmButtonColor: '#ffd700'
    });
    window.invite = () => {
        if(navigator.share) {
            navigator.share({ title: 'Kingmaker Gold', text: 'Play & Win Big!', url: window.location.href });
        } else {
            navigator.clipboard.writeText(window.location.href);
            Swal.fire('Copied!', 'Invite link copied to clipboard', 'success');
        }
    }
    window.logout = () => signOut(auth).then(() => window.location.replace("./login.html"));
</script>
</body>
            </html>
