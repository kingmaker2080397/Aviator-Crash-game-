<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KingMaker Spin Wheel</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#05070a;color:#fff;font-family:sans-serif}

/* 1. FAKE TICKER PATTI */
#winTicker{background:#000;border-bottom:2px solid #ffd700;padding:8px 0;overflow:hidden;white-space:nowrap}
#tickerContent{display:inline-block;animation:scroll 40s linear infinite;color:#10b981;font-weight:700;font-size:13px}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

.header{background:#0b1018;padding:12px;border-bottom:2px solid #b8860b;text-align:center}
.balance{color:#ffd700;font-size:20px;font-weight:900}

/* 2. LEADERBOARD TOP 10 */
.leaderBox{background:#0b1018;border:2px solid #ffd700;border-radius:12px;margin:12px;padding:12px}
.leaderTitle{text-align:center;color:#ffd700;font-size:16px;font-weight:900;margin-bottom:10px}
.top1{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#000;padding:12px;border-radius:8px;margin-bottom:10px;text-align:center;font-weight:900}
.top1.date{font-size:11px;color:#333;margin-top:4px}
.leaderItem{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #222;font-size:13px}
.leaderItem:last-child{border-bottom:none}
.flag{font-size:16px;margin-right:6px}

/* SPIN WHEEL GAME CSS */
.gameContainer{padding:16px;text-align:center}
.wheel-container{position:relative;width:300px;height:300px;margin:20px auto}
.wheel{width:100%;height:100%;border-radius:50%;border:8px solid #ffd700;position:relative;overflow:hidden;transition:transform 4s cubic-bezier(0.17,0.67,0.12,0.99)}
.wheel-section{position:absolute;width:50%;height:50%;transform-origin:100% 100%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:#000}
.pointer{position:absolute;top:-10px;left:50%;transform:translateX(-50%);width:0;height:0;border-left:20px solid transparent;border-right:20px solid transparent;border-top:30px solid #ef4444;z-index:10}

button{width:100%;padding:16px;margin:8px 0;border-radius:8px;border:none;background:#ffd700;color:#000;font-weight:900;font-size:18px;cursor:pointer}
button:disabled{background:#444;color:#888;cursor:not-allowed}
input{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;font-size:16px;text-align:center}

.depositBox{background:#0b1018;padding:12px;border-radius:8px;margin-top:20px;border:1px solid #b8860b;text-align:left}
</style>
</head>
<body>

<!-- 1. FAKE WITHDRAWAL TICKER -->
<div id="winTicker">
  <div id="tickerContent"></div>
</div>

<!-- HEADER -->
<div class="header">
  <div>Balance: <span class="balance" id="userBalance">0 PKR</span></div>
  <div style="margin-top:8px">
    <button onclick="location.href='wallet.html'" style="width:auto;padding:8px 16px;font-size:14px">💳 Wallet</button>
    <button onclick="logout()" style="width:auto;padding:8px 16px;font-size:14px;background:#ef4444">Logout</button>
  </div>
</div>

<!-- 2. FAKE LEADERBOARD TOP 10 -->
<div class="leaderBox">
  <div class="leaderTitle">🏆 TODAY'S TOP WINNERS 🏆</div>
  <div class="top1">
    <div style="font-size:18px">👑 #1 WINNER 👑</div>
    <div id="top1Name">Loading...</div>
    <div class="date" id="todayDate"></div>
  </div>
  <div id="top10List"></div>
</div>

<!-- 3. SPIN WHEEL GAME - TERA ASLI GAME -->
<div class="gameContainer">
  <h2 style="color:#ffd700;margin-bottom:20px">🎡 Spin & Win 🎡</h2>

  <div class="wheel-container">
    <div class="pointer"></div>
    <div class="wheel" id="wheel">
      <div class="wheel-section" style="background:#ef4444;transform:rotate(0deg) skewY(-30deg)">0x</div>
      <div class="wheel-section" style="background:#10b981;transform:rotate(60deg) skewY(-30deg)">2x</div>
      <div class="wheel-section" style="background:#3b82f6;transform:rotate(120deg) skewY(-30deg)">5x</div>
      <div class="wheel-section" style="background:#f59e0b;transform:rotate(180deg) skewY(-30deg)">0x</div>
      <div class="wheel-section" style="background:#8b5cf6;transform:rotate(240deg) skewY(-30deg)">10x</div>
      <div class="wheel-section" style="background:#06b6d4;transform:rotate(300deg) skewY(-30deg)">3x</div>
    </div>
  </div>

  <input id="betAmount" type="number" placeholder="Bet Amount (Min: 10 PKR)">
  <button id="spinBtn" onclick="spinWheel()">SPIN THE WHEEL</button>

  <!-- DEPOSIT INFO - FIXED -->
  <div class="depositBox">
    <b style="color:#ffd700">💰 Deposit Info:</b>
    <div id="depositInfo" style="color:#10b981;margin-top:8px;font-size:15px">Loading...</div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,onValue,update}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
  authDomain: "kingmaker-crash.firebaseapp.com",
  databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
  projectId: "kingmaker-crash",
  storageBucket: "kingmaker-crash.firebasestorage.app",
  messagingSenderId: "327400668393",
  appId: "1:327400668393:web:0d02a340b9f5603f524478"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app),db=getDatabase(app);
let currentUser=null,userBalance=0,isSpinning=false;

const prizes=[0,2,5,0,10,3]; // Wheel ke prizes
let currentRotation=0;

// 1. LOGIN CHECK
onAuthStateChanged(auth,u=>{
  if(!u){location.href='login.html';return}
  currentUser=u;
  loadUserData();
});

// 2. USER DATA + BALANCE
function loadUserData(){
  onValue(ref(db,`users/${currentUser.uid}/balance`),s=>{
    userBalance=s.val()||0;
    document.getElementById('userBalance').innerText=userBalance.toLocaleString()+' PKR';
  });
}

// 3. DEPOSIT INFO FIX - [object Object] solve
onValue(ref(db,'admin/payment_info'),s=>{
  let d=s.val();
  if(d&&d.type){
    document.getElementById('depositInfo').innerHTML=`${d.type}: <b>${d.number}</b><br>Name: <b>${d.name}</b>`;
  }else{
    document.getElementById('depositInfo').innerText='Payment info not set by admin';
  }
});

// 4. FAKE WITHDRAWAL TICKER
const fakeWins=["🔥 Ali 🇵🇰 ne 15,000 PKR jeete!","💰 Fatima 🇸🇦 ne 8,500 PKR withdraw kiye!","🚀 John 🇺🇸 ne 50,000 PKR ka Cash Out!","💎 Ayesha 🇦🇪 ne 22,300 PKR jeete!","⚡ Usman 🇵🇰 ne 1,20,000 PKR withdraw kiye!","👑 Sarah 🇬🇧 ne 45,000 PKR ka Jackpot!"];
document.getElementById('tickerContent').innerHTML=fakeWins.join(" &nbsp;&nbsp;●&nbsp;&nbsp; ")+" &nbsp;&nbsp;●&nbsp;&nbsp; "+fakeWins.join(" &nbsp;&nbsp;●&nbsp;&nbsp; ");

// 5. FAKE LEADERBOARD
const fakeNames=["Ali Khan","Sara Ahmed","Usman Ali","Fatima Noor","Ahmed Raza","Ayesha Malik","Bilal Shah","Zara Sheikh","Hassan Jan","John Smith"];
const flags=["🇵🇰","🇸🇦","🇦🇪","🇺🇸","🇬🇧","🇹🇷","🇶🇦","🇮🇳","🇧🇩","🇨🇳"];
const amounts=[150000,120000,98000,85000,67000,50000,45000,32000,25000,18000];

function updateLeaderboard(){
  document.getElementById('todayDate').innerText=new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  let top1Name=fakeNames[Math.floor(Math.random()*fakeNames.length)];
  let top1Flag=flags[Math.floor(Math.random()*flags.length)];
  let top1Amount=amounts[0]+Math.floor(Math.random()*10000);
  document.getElementById('top1Name').innerHTML=`${top1Flag} ${top1Name} - ${top1Amount.toLocaleString()} PKR`;
  let html='';
  for(let i=1;i<10;i++){
    let name=fakeNames[Math.floor(Math.random()*fakeNames.length)];
    let flag=flags[Math.floor(Math.random()*flags.length)];
    let amount=amounts[i]+Math.floor(Math.random()*5000);
    html+=`<div class="leaderItem"><span><span class="flag">${flag}</span> #${i+1} ${name}</span><span style="color:#10b981;font-weight:700">${amount.toLocaleString()} PKR</span></div>`;
  }
  document.getElementById('top10List').innerHTML=html;
}
updateLeaderboard();
setInterval(updateLeaderboard,8000);

// 6. SPIN WHEEL GAME LOGIC
window.spinWheel=async()=>{
  if(isSpinning)return;
  let amt=parseFloat(document.getElementById('betAmount').value);
  if(!amt||amt<10)return Swal.fire("Error","Min bet 10 PKR","error");
  if(amt>userBalance)return Swal.fire("Error","Balance kam hai","error");

  isSpinning=true;
  document.getElementById('spinBtn').disabled=true;

  // Pehle balance kaat do
  await update(ref(db,`users/${currentUser.uid}`),{balance:userBalance-amt});

  // Random prize choose karo
  let prizeIndex=Math.floor(Math.random()*prizes.length);
  let prize=prizes[prizeIndex];
  let degrees=3600+prizeIndex*60; // 10 chakar + prize pe ruko
  currentRotation+=degrees;

  document.getElementById('wheel').style.transform=`rotate(${currentRotation}deg)`;

  setTimeout(async()=>{
    let winAmount=amt*prize;
    if(prize>0){
      await update(ref(db,`users/${currentUser.uid}`),{balance:userBalance-amt+winAmount});
      Swal.fire("🎉 JEET GAYA!","You won "+winAmount.toLocaleString()+" PKR! ("+prize+"x)","success");
    }else{
      Swal.fire("😢 OH NO!","Better luck next time!","error");
    }
    isSpinning=false;
    document.getElementById('spinBtn').disabled=false;
    document.getElementById('betAmount').value='';
  },4000);
};

window.logout=()=>{signOut(auth).then(()=>location.href='login.html')};
</script>
</body>
    </html>
