<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Golden Scatter - Realtime</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
        }
        * { box-sizing: border-box; }
        body {
            background: #0a0e1a url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070') center/cover fixed;
            color: white;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        h2 {
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 0 20px var(--gold-glow);
            margin-bottom: 20px;
        }
       .machine-body {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 340px;
            margin: 0 auto;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.37), inset 0 1px 0 rgba(255,255,255,0.1);
        }
       .stats {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }
       .screen {
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-around;
            padding: 25px 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
       .slot {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            width: 75px;
            height: 95px;
            line-height: 95px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.1);
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
        }
       .slot.win {
            animation: glow 0.8s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px var(--gold); }
            to { box-shadow: 0 0 25px var(--gold), 0 0 40px var(--gold-glow); }
        }
       .btn-spin {
            background: linear-gradient(135deg, #ffd700, #ffae00);
            border: none;
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 174, 0, 0.4);
            width: 100%;
            color: #000;
            transition: all 0.2s ease;
        }
       .btn-spin:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(255, 174, 0, 0.4);
        }
       .btn-spin:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }
    </style>
</head>
<body>

    <div>
        <h2>🎰 GOLDEN SCATTER 🎰</h2>

        <div class="machine-body">
            <div class="stats">
                <div>Balance: <b id="balance">0</b> PKR</div>
                <div style="color: var(--gold);">Win: <span id="last-win">0</span></div>
            </div>

            <div class="screen">
                <div id="s1" class="slot">❓</div>
                <div id="s2" class="slot">❓</div>
                <div id="s3" class="slot">❓</div>
            </div>

            <button class="btn-spin" id="spinBtn">SPIN (50 PKR)</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, get, update, set, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    let currentBal = 0;
    const slots = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];

    onAuthStateChanged(auth, user => {
        if(user) {
            onValue(ref(db, `users/${user.uid}/balance`), s => {
                currentBal = s.val() || 0;
                document.getElementById('balance').innerText = currentBal;
            });
        } else {
            Swal.fire("Login Required", "Please login to play", "warning");
        }
    });

    document.getElementById('spinBtn').onclick = async function() {
        if (!auth.currentUser) return Swal.fire("Error", "Pehle login karo!", "error");
        if (currentBal < 50) return Swal.fire("Error", "Paisa khatam!", "error");

        this.disabled = true;
        this.innerText = "SPINNING...";
        slots.forEach(s => s.classList.remove('win'));

        const nextResultSnap = await get(ref(db, 'admin/slot_result'));
        let finalIcons;

        if(nextResultSnap.exists() && nextResultSnap.val() === "WIN") {
            finalIcons = ["7", "7", "7"];
            await set(ref(db, 'admin/slot_result'), null);
        } else {
            finalIcons = [Math.floor(Math.random()*9), Math.floor(Math.random()*9), Math.floor(Math.random()*9)];
            if(finalIcons[0] == finalIcons[1] && finalIcons[1] == finalIcons[2]) finalIcons[2] = (finalIcons[2] + 1) % 9;
        }

        await update(ref(db, `users/${auth.currentUser.uid}`), { balance: currentBal - 50 });

        let timer = setInterval(() => {
            slots.forEach(s => s.innerText = Math.floor(Math.random()*9));
        }, 80);

        setTimeout(async () => {
            clearInterval(timer);
            slots[0].innerText = finalIcons[0];
            slots[1].innerText = finalIcons[1];
            slots[2].innerText = finalIcons[2];

            if(finalIcons[0] == finalIcons[1] && finalIcons[1] == finalIcons[2]) {
                let winAmt = 500;
                slots.forEach(s => s.classList.add('win'));
                document.getElementById('last-win').innerText = winAmt;
                Swal.fire("JACKPOT!", `Aap Rs.${winAmt} Jeet Gaye!`, "success");
                push(ref(db, 'requests'), { uid: auth.currentUser.uid, email: auth.currentUser.email, amount: winAmt, status: 'pending', type: 'Slot Win' });
            } else {
                document.getElementById('last-win').innerText = "0";
            }
            this.disabled = false;
            this.innerText = "SPIN (50 PKR)";
        }, 2500);
    };
</script>
</body>
</html>
