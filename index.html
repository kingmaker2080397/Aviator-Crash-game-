<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker - 3D Spin</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.2);
            --border: rgba(255, 255, 255, 0.3);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        body {
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            font-family: 'Poppins', sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; color: white;
        }
        .container {
            background: var(--glass); backdrop-filter: blur(15px);
            border-radius: 30px; border: 1px solid var(--border);
            box-shadow: var(--shadow); width: 90%; max-width: 400px;
            padding: 20px; text-align: center; position: relative;
        }
        .balance-bar {
            background: rgba(0, 0, 0, 0.3); border-radius: 15px;
            padding: 10px 20px; display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 30px;
        }
        .balance-bar span { font-weight: bold; color: #00d2d3; }
        
        /* 3D Wheel Design */
        .wheel-container { position: relative; margin: 20px auto; width: 300px; height: 300px; }
        .pointer {
            position: absolute; top: -15px; left: 50%; transform: translateX(-50%);
            z-index: 10; width: 40px; filter: drop-shadow(0 5px 15px rgba(0,0,0,0.5));
        }
        #wheel {
            width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid #333; box-shadow: 0 0 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(0,0,0,0.5);
            transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1);
            background: conic-gradient(
                #ff7675 0 45deg, #74b9ff 45deg 90deg, #55efc4 90deg 135deg, 
                #ffeaa7 135deg 180deg, #a29bfe 180deg 225deg, #fd79a8 225deg 270deg, 
                #81ecec 270deg 315deg, #fab1a0 315deg 360deg
            );
        }
        .center-nut {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; background: white; border-radius: 50%;
            box-shadow: 0 0 15px rgba(0,0,0,0.5); z-index: 5;
        }
        .spin-btn {
            background: linear-gradient(45deg, #00d2d3, #00a8ff);
            border: none; padding: 15px 50px; border-radius: 50px;
            color: white; font-size: 1.2rem; font-weight: bold;
            cursor: pointer; box-shadow: 0 10px 20px rgba(0, 210, 211, 0.4);
            margin-top: 30px; transition: 0.3s;
        }
        .spin-btn:active { transform: scale(0.95); }
    </style>
</head>
<body>
    <div class="container">
        <div class="balance-bar">
            <div>Balance: Rs. <span id="userBalance">0</span></div>
            <button onclick="location.href='wallet.html'" style="background:none; border:1px solid #00d2d3; color:white; border-radius:10px; cursor:pointer;">Wallet</button>
        </div>
        
        <h2>Spin & Win</h2>
        <div class="wheel-container">
            <img src="https://cdn-icons-png.flaticon.com/512/8155/8155940.png" class="pointer">
            <div id="wheel"></div>
            <div class="center-nut"></div>
        </div>
        
        <button class="spin-btn" onclick="spinNow()">SPIN NOW</button>
    </div>

    <script type="module">
        // [Aapki Firebase Config Yahan Aayegi]
        // Spin Logic
        let currentRotation = 0;
        window.spinNow = () => {
            currentRotation += Math.floor(Math.random() * 360) + 3600;
            document.getElementById('wheel').style.transform = `rotate(${currentRotation}deg)`;
        };
    </script>
</body>
</html>
