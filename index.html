<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moon Crash Pro - Demo</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--moon-glow:#e0f7ff;--moon-blue:#8bb9ff;--glass:rgba(200,220,255,0.07);--glass-border:rgba(200,220,255,0.18);--dark-space:#060913;--green:#00ff88;--red:#ff3b3b}
*{box-sizing:border-box;margin:0;padding:0}

.btn-bet{background:linear-gradient(135deg,var(--moon-glow),var(--moon-blue));color:var(--dark-space);box-shadow:0 5px 25px rgba(139,185,255,0.5)}

.history{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:16px}
.history-item{background:rgba(6,9,19,0.7);border:1px solid var(--glass-border);padding:7px 13px;border-radius:12px;font-size:.8rem;font-weight:700}
.history-item.win{color:var(--green);border-color:var(--green);box-shadow:0 0 10px rgba(0,255,136,0.3)}
.history-item.lose{color:var(--red);border-color:var(--red);box-shadow:0 0 10px rgba(255,59,59,0.3)}
</style>
</head>
<body>

</div>
</div>

</div>

<div class="history" id="history"></div>
</div>
</div>

</body>
</html>
