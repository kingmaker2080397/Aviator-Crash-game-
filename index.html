<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Pro - Multiplayer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        #game-canvas { background: #050505; position: relative; height: 320px; border-radius: 20px; border: 2px solid #1f2937; overflow: hidden; }
        
        /* Rocket & Red Line Animation */
        #rocket { position: absolute; bottom: 20px; left: 20px; font-size: 3.5rem; transition: all 0.15s linear; z-index: 10; filter: drop-shadow(0 0 10px red); }
        #path-line { position: absolute; bottom: 35px; left: 35px; background: linear-gradient(to right, transparent, #ff0000); height: 4px; transform-origin: left center; z-index: 5; border-radius: 10px; box-shadow: 0 0 15px red; }
        
        .multiplier-text { font-size: 4.5rem; font-weight: 900; position: absolute; top: 45%; left: 50%; transform: translate(-50%, -50%); z-index: 1; text-shadow: 0 0 20px rgba(255,255,255,0.2); }
        .hidden { display: none; }
        
        /* Smoke Particles */
        .smoke { position: absolute; width: 8px; height: 8px; background: rgba(255,255,255,0.3); border-radius: 50%; animation: smokeAnim 0.7s linear forwards; z-index: 4; }
        @keyframes smokeAnim { to { transform: translate(-40px, 40px) scale(3); opacity: 0; } }
    </style>
</head>
<body>
    <div class="p-4 flex justify-between items-center bg-gray-900 shadow-xl border-b border-gray-800">
        <div>
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest">Account Balance</p>
            <h2 class="text-xl font-black text-yellow-500">PKR <span id="bal">0</span></h2>
        </div>
        <div class="flex gap-2">
            <a id="support-link" href="#" target="_blank" class="bg-blue-600 px-3 py-2 rounded-lg text-[10px] font-bold shadow-lg shadow-blue-900/50">SUPPORT</a>
            <button onclick="shareApp()" class="bg-green-600 px-3 py-2 rounded-lg text-[10px] font-bold shadow-lg shadow-green-900/50">SHARE</button>
        </div>
    </div>

    <div class="p-4 max-w-lg mx-auto">
        <div id="game-canvas" class="mt-2">
            <div id="multiplier" class="multiplier-text text-white">READY</div>
            <div id="status-label" class="absolute top-4 left-1/2 -translate-x-1/2 text-[10px] font-bold text-gray-500 uppercase tracking-widest">Waiting for round...</div>
            <div id="rocket">🚀</div>
            <div id="path-line"></div>
        </div>

        <div class="mt-4 bg-gray-900 p-6 rounded-[2.5rem] border border-gray-800 shadow-2xl">
            <div class="flex items-center justify-between mb-2 px-2">
                <span class="text-[10px] font-bold text-gray-400 uppercase tracking-tighter">Bet Amount (10-500)</span>
            </div>
            <input id="bet-amt" type="number" value="100" class="bg-black text-yellow-500 font-black text-center w-full p-4 rounded-2xl border border-gray-700 outline-none text-3xl mb-4 focus:border-red-600 transition-all">
            
            <button id="bet-btn" onclick="placeBet()" class="w-full bg-red-600 hover:bg-red-700 py-5 rounded-2xl font-black text-2xl uppercase shadow-lg active:scale-95">Place Bet</button>
            <button id="cash-btn" onclick="cashOut()" class="hidden w-full bg-yellow-500 hover:bg-yellow-400 py-5 rounded-2xl font-black text-2xl uppercase text-black animate-pulse shadow-lg">Cash Out</button>
            <div id="waiting-msg" class="hidden text-center text-gray-500 font-bold mt-2 italic text-sm">Bet Placed! Takeoff soon...</div>
        </div>

        <div class="mt-4 grid grid-cols-2 gap-3">
            <div class="bg-gray-900 p-3 rounded-2xl border border-gray-800">
                <p class="text-[9px] text-gray-500 font-bold uppercase mb-1">Referral Code</p>
                <p id="ref-code" class="text-yellow-500 font-black text-sm tracking-widest">LOADING</p>
            </div>
            <div class="bg-gray-900 p-3 rounded-2xl border border-gray-800">
                <p class="text-[9px] text-red-500 font-bold uppercase mb-1">Deposit Info</p>
                <p id="admin-num" class="text-white font-bold text-xs">03XX-XXXXXXX</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
            authDomain: "kingmaker-crash.firebaseapp.com",
            databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
            projectId: "kingmaker-crash",
            storageBucket: "kingmaker-crash.firebasestorage.app",
            messagingSenderId: "327400668393",
            appId: "1:327400668393:web:0d02a340b9f5603f524478"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        
        let uID, uBal = 0, isBetting = false, hasCashedOut = false, myBet = 0;
        const flySound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-fast-jet-plane-flyby-1613.mp3');

        onAuthStateChanged(auth, (user) => {
            if(user) {
                uID = user.uid;
                document.getElementById('ref-code').innerText = uID.substring(0,6).toUpperCase();
                onValue(ref(db, `users/${uID}/balance`), s => { uBal = s.val() || 0; document.getElementById('bal').innerText = uBal; });
                
                // Admin Settings Sync
                onValue(ref(db, 'adminSettings'), (s) => {
                    const data = s.val();
                    if(data) {
                        document.getElementById('admin-num').innerText = data.paymentInfo.number;
                        document.getElementById('support-link').href = data.supportLink || "#";
                    }
                });
            }
        });

        // Live Game Sync
        onValue(ref(db, 'gameSystem'), (s) => {
            const data = s.val(); if(!data) return;
            const rocket = document.getElementById('rocket');
            const line = document.getElementById('path-line');
            const multText = document.getElementById('multiplier');
            const statusLabel = document.getElementById('status-label');

            if(data.state === "START") {
                statusLabel.innerText = "Rocket is flying!";
                multText.innerText = data.multiplier.toFixed(2) + "x";
                multText.style.color = "#22c55e";
                
                // Animation Logic (Diagonal Movement)
                let x = Math.min(data.multiplier * 22, 260); 
                let y = Math.min(data.multiplier * 18, 220);
                rocket.style.transform = `translate(${x}px, -${y}px) rotate(45deg)`;
                line.style.width = Math.sqrt(x*x + y*y) + "px";
                line.style.transform = `rotate(-${Math.atan2(y, x) * (180/Math.PI)}deg)`;
                
                createSmoke(x + 20, y + 20); // Particle effect
                if(flySound.paused) flySound.play();

                if(isBetting && !hasCashedOut) {
                    document.getElementById('cash-btn').classList.remove('hidden');
                    document.getElementById('bet-btn').classList.add('hidden');
                    document.getElementById('waiting-msg').classList.add('hidden');
                }
            } 
            else if(data.state === "CRASHED") {
                statusLabel.innerText = "Crashed!";
                rocket.innerHTML = "💥";
                multText.innerText = data.multiplier.toFixed(2) + "x";
                multText.style.color = "#ef4444";
                flySound.pause(); flySound.currentTime = 0;
                
                setTimeout(() => {
                    rocket.innerHTML = "🚀";
                    rocket.style.transform = "none";
                    line.style.width = "0";
                    multText.innerText = "READY";
                    multText.style.color = "white";
                    resetRound();
                }, 3000);
            }
        });

        window.placeBet = async () => {
            const amt = parseInt(document.getElementById('bet-amt').value);
            if(amt < 10 || amt > 500 || amt > uBal) return alert("Balance kam hai!");

            myBet = amt; isBetting = true; hasCashedOut = false;
            await update(ref(db, `users/${uID}`), { balance: uBal - amt });
            
            document.getElementById('bet-btn').classList.add('hidden');
            document.getElementById('waiting-msg').classList.remove('hidden');
        };

        window.cashOut = async () => {
            if(!isBetting || hasCashedOut) return;
            const snap = await get(ref(db, 'gameSystem/multiplier'));
            const currentMult = snap.val() || 1.0;

            hasCashedOut = true;
            const winnings = Math.floor(myBet * currentMult);
            await update(ref(db, `users/${uID}`), { balance: uBal + winnings });
            
            alert(`Cashed Out! Win PKR ${winnings}`);
            document.getElementById('cash-btn').classList.add('hidden');
            document.getElementById('waiting-msg').innerText = "Winner!";
            document.getElementById('waiting-msg').classList.remove('hidden');
        };

        function createSmoke(x, y) {
            const canvas = document.getElementById('game-canvas');
            const smoke = document.createElement('div');
            smoke.className = 'smoke';
            smoke.style.left = (x + 15) + "px";
            smoke.style.bottom = (y + 15) + "px";
            canvas.appendChild(smoke);
            setTimeout(() => smoke.remove(), 700);
        }

        function resetRound() {
            isBetting = false; hasCashedOut = false;
            document.getElementById('bet-btn').classList.remove('hidden');
            document.getElementById('cash-btn').classList.add('hidden');
            document.getElementById('waiting-msg').classList.add('hidden');
            document.getElementById('waiting-msg').innerText = "Bet Placed! Takeoff soon...";
        }

        window.shareApp = () => {
            const text = `Earn daily with Aviator Pro! My Code: ${document.getElementById('ref-code').innerText}`;
            if(navigator.share) navigator.share({title: 'Aviator Pro', text: text, url: window.location.href});
            else alert("Link Copied!");
        };
    </script>
</body>
</html>
