<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Pro - Kingmaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; overflow-x: hidden; }
        #game-area { background: radial-gradient(circle at bottom, #1a1a2e 0%, #050505 100%); position: relative; overflow: hidden; height: 350px; border-radius: 2rem; border: 2px solid #1f2937; }
        #rocket { font-size: 5rem; position: absolute; bottom: 20px; left: 20px; transition: all 0.1s linear; z-index: 10; transform: rotate(45deg); }
        .smoke { position: absolute; width: 10px; height: 10px; background: rgba(255,255,255,0.4); border-radius: 50%; animation: smokeOut 0.8s linear forwards; z-index: 5; }
        @keyframes smokeOut { to { transform: translate(-50px, 50px) scale(4); opacity: 0; } }
        #multiplier { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-size: 5rem; font-weight: 900; z-index: 1; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="p-4 flex justify-between items-center bg-gray-900 border-b border-gray-800">
        <div><p class="text-[10px] text-gray-500 font-bold uppercase">Balance</p><h2 class="text-xl font-black text-yellow-500">PKR <span id="bal">0</span></h2></div>
        <button onclick="location.reload()" class="bg-red-600 px-4 py-1 rounded-full text-[10px] font-bold">REFRESH</button>
    </div>

    <div class="p-4 max-w-lg mx-auto">
        <div id="game-area" class="mt-4">
            <div id="multiplier">READY</div>
            <div id="rocket">🚀</div>
        </div>

        <div class="mt-6 bg-gray-900 p-6 rounded-[2rem] border border-gray-800 shadow-2xl text-center">
            <input id="bet-amt" type="number" value="100" class="bg-black text-yellow-500 font-black text-center w-full p-4 rounded-xl border border-gray-700 outline-none text-2xl mb-4">
            <button id="bet-btn" onclick="placeBet()" class="w-full bg-red-600 py-5 rounded-2xl font-black text-2xl uppercase active:scale-95 transition shadow-[0_0_20px_rgba(220,38,38,0.5)]">Place Bet</button>
            <button id="cash-btn" onclick="cashOut()" class="hidden w-full bg-yellow-500 py-5 rounded-2xl font-black text-2xl uppercase text-black shadow-lg animate-pulse">Cash Out</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
            authDomain: "kingmaker-crash.firebaseapp.com",
            databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
            projectId: "kingmaker-crash",
            storageBucket: "kingmaker-crash.firebasestorage.app",
            messagingSenderId: "327400668393",
            appId: "1:327400668393:web:0d02a340b9f5603f524478"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uID, uBal, myBet = 0, isBetting = false, multInterval;

        // Sounds
        const flySound = new Audio('https://shashank7s.github.io/Codepen-Assets/aviator/fly.mp3');
        const crashSound = new Audio('https://assets.mixkit.co/sfx/preview/mixkit-cinematic-explosion-impact-1701.mp3');

        onAuthStateChanged(auth, (user) => { 
            if(user) { 
                uID = user.uid; 
                onValue(ref(db, `users/${uID}/balance`), s => { 
                    uBal = s.val() || 0; 
                    document.getElementById('bal').innerText = uBal; 
                }); 
            } 
        });

        // Live Game Sync
        onValue(ref(db, 'gameSystem'), (s) => {
            const data = s.val(); if(!data) return;
            const rocket = document.getElementById('rocket');
            const multText = document.getElementById('multiplier');

            if(data.state === "START") {
                multText.innerText = data.multiplier.toFixed(2) + "x";
                multText.style.color = "#22c55e";
                
                // Rocket Movement Calculation
                let move = Math.min(data.multiplier * 30, 250);
                rocket.style.bottom = (20 + move) + "px";
                rocket.style.left = (20 + move) + "px";
                
                createSmoke(20 + move, 20 + move);
                if(flySound.paused) flySound.play();

            } else if(data.state === "CRASHED") {
                clearInterval(multInterval);
                rocket.innerHTML = "💥";
                flySound.pause();
                crashSound.play();
                multText.innerText = "CRASHED " + (data.lastCrash || 1.0).toFixed(2) + "x";
                multText.style.color = "#ef4444";
                
                setTimeout(() => {
                    rocket.innerHTML = "🚀";
                    rocket.style.bottom = "20px";
                    rocket.style.left = "20px";
                    multText.innerText = "READY";
                    multText.style.color = "white";
                    resetUI();
                }, 3000);
            }
        });

        window.placeBet = async () => {
            const amt = parseInt(document.getElementById('bet-amt').value);
            if(amt < 10 || amt > 500) return alert("Limit: 10-500 PKR");
            if(amt > uBal) return alert("Balance kam hai!");

            myBet = amt; isBetting = true;
            
            // 1. Update status to Firebase immediately
            await update(ref(db, `users/${uID}`), { balance: uBal - amt });
            await update(ref(db, 'gameSystem'), { state: "START", multiplier: 1.0 });

            document.getElementById('bet-btn').classList.add('hidden');
            document.getElementById('cash-btn').classList.remove('hidden');

            // 2. Start local speed loop for Firebase
            let currentM = 1.0;
            multInterval = setInterval(() => {
                currentM += 0.05; // Speed adjustment
                update(ref(db, 'gameSystem/multiplier'), currentM);
            }, 150);
        };

        window.cashOut = async () => {
            if(!isBetting) return;
            const snap = await get(ref(db, 'gameSystem/multiplier'));
            const win = Math.floor(myBet * snap.val());
            
            await update(ref(db, `users/${uID}`), { balance: uBal + win });
            alert("Congratulations! You won PKR " + win);
            resetUI();
        };

        function createSmoke(b, l) {
            const gameArea = document.getElementById('game-area');
            const smoke = document.createElement('div');
            smoke.className = 'smoke';
            smoke.style.bottom = b + "px";
            smoke.style.left = l + "px";
            gameArea.appendChild(smoke);
            setTimeout(() => smoke.remove(), 800);
        }

        function resetUI() {
            isBetting = false;
            document.getElementById('bet-btn').classList.remove('hidden');
            document.getElementById('cash-btn').classList.add('hidden');
            flySound.pause();
            flySound.currentTime = 0;
        }
    </script>
</body>
</html>
