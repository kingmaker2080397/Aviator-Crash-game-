<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustCraze.pk - Tadakta Bhadakta Store 🔥</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f5f5f5; }
    .header { background: #FF3D00; color: white; padding: 15px; text-align: center; position: sticky; top: 0; }
    .header h1 { margin: 0; }
    .products { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; }
    .card { background: white; border-radius: 8px; padding: 10px; box-shadow: 0 2px 5px #ccc; }
    .card img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; }
    .btn { background: #FF3D00; color: white; border: none; padding: 8px 12px; border-radius: 4px; cursor: pointer; margin-top: 5px; }
    .btn:hover { background: #D32F2F; }
  </style>
</head>
<body>
  <div class="header">
    <h1>JustCraze.pk 🔥</h1>
    <button id="loginBtn" class="btn">Login with Google</button>
    <span id="userEmail"></span>
  </div>

  <div id="products" class="products"><p>Loading products...</p></div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // TUMHARI FIREBASE CONFIG ADD KAR DI HAI
    const firebaseConfig = {
      apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
      authDomain: "kingmaker-crash.firebaseapp.com",
      databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
      projectId: "kingmaker-crash",
      storageBucket: "kingmaker-crash.firebasestorage.app",
      messagingSenderId: "327400668393",
      appId: "1:327400668393:web:0d02a340b9f5603f524478",
      measurementId: "G-LVVD55RDQV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginBtn').style.display = 'none';
        document.getElementById('userEmail').innerText = `Hi, ${user.displayName}`;
      }
    });

    async function loadProducts() {
      const querySnapshot = await getDocs(collection(db, "products"));
      const productsDiv = document.getElementById('products');
      productsDiv.innerHTML = '';
      if (querySnapshot.empty) {
        productsDiv.innerHTML = '<p>Abhi koi product nahi hai. Admin se add karwao.</p>';
        return;
      }
      querySnapshot.forEach((doc) => {
        const p = doc.data();
        productsDiv.innerHTML += `
          <div class="card">
            <img src="${p.imageUrl}" alt="${p.title}">
            <h3>${p.title}</h3>
            <p>Rs. ${p.price}</p>
            <button class="btn" onclick="alert('Added: ${p.title}')">Add to Cart</button>
          </div>
        `;
      });
    }
    loadProducts();
  </script>
</body>
</html>
