<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Gold - Spin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --gold: #ffd700; --dark: #0b0f1a; --glass: rgba(255, 255, 255, 0.05); }
        body { background: var(--dark); color: white; font-family: 'Poppins', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow-x: hidden; }
        .app-container { width: 90%; max-width: 400px; text-align: center; }
        
        /* Header */
        .header { background: var(--glass); backdrop-filter: blur(10px); border-radius: 20px; padding: 15px; border: 1px solid rgba(255,215,0,0.2); display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bal { font-size: 18px; font-weight: bold; color: var(--gold); }
        
        /* Wheel Section */
        .wheel-box { position: relative; width: 300px; height: 300px; margin: auto; border: 8px solid #1a1f2e; border-radius: 50%; box-shadow: 0 0 40px rgba(0,0,0,0.7); }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 45px; z-index: 10; }

        /* Buttons */
        .spin-btn { background: linear-gradient(135deg, #ffd700, #b8860b); color: black; width: 100%; padding: 15px; border-radius: 15px; font-size: 20px; font-weight: bold; border: none; margin: 20px 0; cursor: pointer; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn-small { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); color: #ccc; padding: 12px; border-radius: 12px; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">
        <div class="bal">💰 Rs. <span id="userBal">0</span></div>
        <button class="btn-small" onclick="logout()" style="color:#ff4d4d;">Logout</button>
    </div>

    <div class="wheel-box">
        <img src="https://cdn-icons-png.flaticon.com/512/8155/8155940.png" class="pointer">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN NOW</button>

    <div class="grid">
        <button class="btn-small" onclick="share()">📩 Invite Friends</button>
        <button class="btn-small" onclick="share()">🔗 Share App</button>
        <button class="btn-small" onclick="location.href='wallet.html'">💳 Wallet</button>
        <button class="btn-small">👤 Profile</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    const segments = ["5", "1000", "5000", "20", "1000", "2", "100", "5"];
    const colors = ["#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700", "#1a1f2e", "#ffd700"];

    function draw() {
        const ang = (Math.PI * 2) / segments.length;
        segments.forEach((val, i) => {
            ctx.beginPath(); ctx.fillStyle = colors[i]; ctx.moveTo(250,250);
            ctx.arc(250,250,245, i*ang, (i+1)*ang); ctx.fill();
            ctx.save(); ctx.translate(250,250); ctx.rotate(i*ang + ang/2);
            ctx.fillStyle = colors[i]=="#ffd700"?"black":"white"; ctx.font="bold 28px Arial";
            ctx.fillText("Rs."+val, 110, 10); ctx.restore();
        });
    }
    draw();

    let rot = 0;
    onAuthStateChanged(auth, user => {
        if(!user) { /* Redirect to login if needed */ }
        else {
            onValue(ref(db, `users/${user.uid}/balance`), s => {
                document.getElementById("userBal").innerText = s.val() || 0;
            });
        }
    });

    document.getElementById("spinBtn").onclick = function() {
        this.disabled = true;
        const move = Math.floor(Math.random() * 360) + 3600;
        rot += move;
        canvas.style.transform = `rotate(${rot}deg)`;
        
        setTimeout(() => {
            const index = Math.floor(((360 - (rot % 360) + 270) % 360) / 45);
            const win = segments[index];
            Swal.fire({ title: 'You Won!', text: `Rs.${win} added to requests`, icon: 'success', confirmButtonColor: '#ffd700' });
            push(ref(db, 'requests'), { uid: auth.currentUser.uid, email: auth.currentUser.email, amount: win, status: 'pending' });
            this.disabled = false;
        }, 5000);
    };

    window.share = () => navigator.share({ title: 'Kingmaker', text: 'Play & Win!', url: window.location.href });
    window.logout = () => signOut(auth).then(() => location.reload());
</script>
</body>
</html>
