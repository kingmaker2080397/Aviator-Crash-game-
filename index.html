<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Ludo King - Play & Win</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(135deg,#0f172a,#1e293b);color:#fff;font-family:'Segoe UI',sans-serif;min-height:100vh;padding:16px}
.hdr{background:rgba(15,23,42,0.8);backdrop-filter:blur(10px);border:1px solid #ffd700;border-radius:16px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.bal{font-size:24px;font-weight:900;background:linear-gradient(45deg,#ffd700,#ff8c00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.btn{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#000;border:none;padding:10px 20px;border-radius:12px;font-weight:900;cursor:pointer}
.game-box{background:rgba(15,23,42,0.8);border:1px solid #ffd700;border-radius:16px;padding:20px;text-align:center}
#ludoBoard{width:100%;max-width:500px;height:500px;background:#1a1a2e;border:4px solid #ffd700;border-radius:12px;margin:20px auto;display:grid;grid-template-columns:repeat(15,1fr);grid-template-rows:repeat(15,1fr);gap:1px}
.cell{background:#0f172a;border:1px solid #333}
.red{background:#ef4444}.green{background:#10b981}.yellow{background:#fbbf24}.blue{background:#3b82f6}
.home{background:#1e293b}.safe{background:#ffd700}.center{background:#8b5cf6}
.goti{width:80%;height:80%;border-radius:50%;margin:10%;border:2px solid #fff;cursor:pointer;box-shadow:0 0 10px rgba(0,0,0,0.5)}
.dice-box{margin:20px 0}
#dice{width:80px;height:80px;background:#fff;color:#000;border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:40px;font-weight:900;cursor:pointer;box-shadow:0 5px 20px rgba(255,215,0,0.5)}
#dice.roll{animation:shake 0.5s}
@keyframes shake{0%,100%{transform:rotate(0deg)}25%{transform:rotate(20deg)}75%{transform:rotate(-20deg)}}
.player-turn{font-size:20px;font-weight:900;margin:10px 0;color:#ffd700}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px}
</style>
</head>
<body>

<div class="hdr">
    <div>
        <small>BALANCE</small>
        <div class="bal">Rs. <span id="bal">0</span></div>
        <small id="userEmail" style="color:#999;font-size:10px"></small>
    </div>
    <button class="btn" onclick="logout()">LOGOUT</button>
</div>

<div class="game-box">
    <h2>🎲 LUDO KING 🎲</h2>
    <div class="player-turn" id="playerTurn">Teri Baari</div>

    <div id="ludoBoard"></div>

    <div class="dice-box">
        <div id="dice" onclick="rollDice()">🎲</div>
        <p>Dice: <span id="diceValue">0</span></p>
    </div>

    <div class="grid">
        <button class="btn" onclick="window.location.href='wallet.html'">💰 WALLET</button>
        <button class="btn" onclick="window.location.href='admin.html'">⚙️ ADMIN</button>
    </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,onValue,get,update}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

// FIREBASE CONFIG - TERI WALI ID
const firebaseConfig = {
  apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
  authDomain: "kingmaker-crash.firebaseapp.com",
  databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
  projectId: "kingmaker-crash",
  storageBucket: "kingmaker-crash.firebasestorage.app",
  messagingSenderId: "327400668393",
  appId: "1:327400668393:web:0d02a340b9f5603f524478"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUser = null;
let diceVal = 0;
let canRoll = true;

// LOGIN CHECK
onAuthStateChanged(auth, user => {
    if(!user) return window.location.href = "login.html";
    currentUser = user;
    document.getElementById("userEmail").innerText = user.email;

    // Balance load karo
    onValue(ref(db,`users/${user.uid}/balance`), snap => {
        document.getElementById("bal").innerText = (snap.val() || 0).toLocaleString();
    });

    // Block check
    onValue(ref(db,`users/${user.uid}/blocked`), snap => {
        if(snap.val() === true){
            Swal.fire("Blocked!","Admin ne tumhe block kar diya","error").then(()=>{
                logout();
            });
        }
    });

    initLudoBoard();
});

window.logout = () => signOut(auth).then(() => window.location.href = "login.html");

// LUDO BOARD BANAO
function initLudoBoard(){
    const board = document.getElementById("ludoBoard");
    board.innerHTML = "";

    // 15x15 grid = 225 cells
    for(let i = 0; i < 225; i++){
        const cell = document.createElement("div");
        cell.className = "cell";

        // Red home area
        if((i >= 0 && i <= 5) || (i >= 15 && i <= 20) || (i >= 30 && i <= 35) || (i >= 45 && i <= 50) || (i >= 60 && i <= 65) || (i >= 75 && i <= 80)){
            cell.classList.add("red","home");
        }
        // Green home area
        if((i >= 9 && i <= 14) || (i >= 24 && i <= 29) || (i >= 39 && i <= 44) || (i >= 54 && i <= 59) || (i >= 69 && i <= 74) || (i >= 84 && i <= 89)){
            cell.classList.add("green","home");
        }
        // Center
        if(i === 112) cell.classList.add("center");

        board.appendChild(cell);
    }

    // Goti daalo - Red
    addGoti(1, "red");
    addGoti(3, "red");
    addGoti(16, "red");
    addGoti(18, "red");

    // Goti daalo - Green
    addGoti(10, "green");
    addGoti(12, "green");
    addGoti(25, "green");
    addGoti(27, "green");
}

function addGoti(pos, color){
    const cells = document.querySelectorAll(".cell");
    const goti = document.createElement("div");
    goti.className = `goti ${color}`;
    goti.onclick = () => moveGoti(goti, color);
    cells[pos].appendChild(goti);
}

// DICE ROLL
window.rollDice = () => {
    if(!canRoll) return;
    canRoll = false;

    const dice = document.getElementById("dice");
    dice.classList.add("roll");

    let count = 0;
    const interval = setInterval(() => {
        diceVal = Math.floor(Math.random() * 6) + 1;
        dice.innerText = diceVal;
        count++;
        if(count > 10){
            clearInterval(interval);
            dice.classList.remove("roll");
            document.getElementById("diceValue").innerText = diceVal;
            canRoll = true;

            if(diceVal === 6){
                Swal.fire("6 Aaya!","Ab goti chalo","success");
            }
        }
    }, 100);
};

function moveGoti(goti, color){
    if(diceVal === 0) return Swal.fire("Pehle dice roll karo","error");
    if(diceVal!== 6 &&!goti.dataset.out){
        return Swal.fire("6 nahi aaya","Goti nikalne ke liye 6 chahiye","warning");
    }

    Swal.fire("Chal Di!","Goti move ho gayi","success");
    goti.dataset.out = true;
    diceVal = 0;
    document.getElementById("diceValue").innerText = "0";
}
</script>
</body>
</html>
