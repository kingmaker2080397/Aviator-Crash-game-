<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Moon Aviator</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>

.tab.active{background:rgba(139,185,255,0.2);color:var(--moon)}
.bet-controls{display:flex;gap:10px;align-items:center;margin-bottom:10px}

.amt-input:focus{outline:0}

.progress{width:100%;height:4px;background:rgba(6,9,19,0.6);border-radius:10px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),var(--moon));width:69%;border-radius:10px}
</style>
</head>

</div>

<div class="bet-panel">
<div class="tabs">
<div class="tab active">Bet</div>
<div class="tab">Auto</div>
</div>
<div class="bet-controls">
<div style="flex:1">
<div class="amt-controls">

<button class="quick-btn" onclick="setAmt2(5)">5</button>

</div>

<div class="stat-tab">Top</div>
</div>

<div class="progress"><div class="progress-fill"></div></div>
</div>
