<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Moon Aviator Pro</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --moon: #8bb9ff; --moon2: #e0f7ff; --bg: #060913; --bg2: #0b0f1e;
            --glass: rgba(139,185,255,0.08); --border: rgba(139,185,255,0.2);
            --green: #00ff88; --red: #ff3b3b; --orange: #ff9500;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: radial-gradient(ellipse at 50% 0%, #1a2040 0%, var(--bg) 60%);
            color: #fff; font-family: 'Outfit', sans-serif; min-height: 100vh; padding: 10px;
            overflow-x: hidden;
        }
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; }
        .logo { font-size: 1.8rem; font-weight: 900; color: var(--moon); text-shadow: 0 0 20px var(--moon); }
        .balance { font-weight: 800; color: var(--green); font-size: 1.1rem; }
        
        .history-bar { display: flex; gap: 6px; overflow-x: auto; padding: 8px 5px; margin-bottom: 8px; scrollbar-width: none; }
        .hist-item { background: rgba(6,9,19,0.6); padding: 5px 12px; border-radius: 8px; font-size: .75rem; font-weight: 700; border: 1px solid var(--border); }
        .hist-item.purple { color: #b47cff; } .hist-item.blue { color: var(--moon); } .hist-item.red { color: var(--red); }

        .graph-wrap {
            background: radial-gradient(ellipse at center, rgba(11,15,30,0.95), var(--bg2));
            border-radius: 16px; position: relative; height: 300px; overflow: hidden;
            border: 1px solid var(--border); margin-bottom: 12px;
        }
        #graph { width: 100%; height: 100%; }
        .plane { position: absolute; font-size: 2.2rem; z-index: 5; transition: transform 0.1s linear; pointer-events: none; }
        
        .multiplier-box { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); z-index: 10; text-align: center; pointer-events: none; }
        .multiplier { font-size: 4rem; font-weight: 900; color: #fff; text-shadow: 0 0 30px var(--moon); }
        .multiplier.crashed { color: var(--red); }

        .bet-panel-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        @media (max-width: 600px) { .bet-panel-container { grid-template-columns: 1fr; } }

        .bet-panel { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--border); border-radius: 20px; padding: 15px; }
        .amt-controls { display: flex; align-items: center; justify-content: space-between; background: rgba(0,0,0,0.3); padding: 5px; border-radius: 12px; margin-bottom: 10px; }
        .btn-icon { width: 30px; height: 30px; border-radius: 50%; border: none; background: var(--moon); color: #000; font-weight: bold; cursor: pointer; }
        .amt-input { background: transparent; border: none; color: #fff; text-align: center; font-weight: 800; width: 60px; }
        
        .btn-bet { 
            width: 100%; background: linear-gradient(135deg, var(--green), #00cc6a); border: 0; padding: 15px; 
            border-radius: 14px; color: #fff; font-weight: 900; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s;
        }
        .btn-bet.cancel { background: linear-gradient(135deg, var(--red), #cc0000); }
        .quick-btns { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .quick-btn { background: rgba(255,255,255,0.1); border: none; color: #fff; padding: 5px; border-radius: 5px; font-size: 0.8rem; cursor: pointer; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">MoonAviator</div>
    <div class="balance"><span id="bal">3,000.00</span> COINS</div>
</div>

<div class="history-bar" id="history"></div>

<div class="graph-wrap">
    <canvas id="graph"></canvas>
    <div class="plane" id="plane">✈️</div>
    <div class="multiplier-box">
        <div class="multiplier" id="mult">1.00x</div>
    </div>
</div>

<div class="bet-panel-container">
    <div class="bet-panel">
        <div class="quick-btns">
            <button class="quick-btn" onclick="setAmt(1)">1</button>
            <button class="quick-btn" onclick="setAmt(5)">5</button>
            <button class="quick-btn" onclick="setAmt(10)">10</button>
            <button class="quick-btn" onclick="setAmt(50)">50</button>
        </div>
        <div class="amt-controls">
            <button class="btn-icon" onclick="changeAmt(-1)">−</button>
            <input type="number" class="amt-input" id="amt" value="1.00">
            <button class="btn-icon" onclick="changeAmt(1)">+</button>
        </div>
        <button class="btn-bet" id="betBtn" onclick="handleBet(1)">BET</button>
    </div>

    <div class="bet-panel">
        <div class="quick-btns">
            <button class="quick-btn" onclick="setAmt2(1)">1</button>
            <button class="quick-btn" onclick="setAmt2(5)">5</button>
            <button class="quick-btn" onclick="setAmt2(10)">10</button>
            <button class="quick-btn" onclick="setAmt2(50)">50</button>
        </div>
        <div class="amt-controls">
            <button class="btn-icon" onclick="changeAmt2(-1)">−</button>
            <input type="number" class="amt-input" id="amt2" value="1.00">
            <button class="btn-icon" onclick="changeAmt2(1)">+</button>
        </div>
        <button class="btn-bet" id="betBtn2" onclick="handleBet(2)">BET</button>
    </div>
</div>

<script>
let coins=3000, isFlying=false, mult=1.00, crashPt=0, pathPts=[];
let betPlaced1=false, betPlaced2=false, hasCashed1=false, hasCashed2=false;
let betAmt1=0, betAmt2=0;

const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");
const multEl = document.getElementById("mult");
const planeEl = document.getElementById("plane");
const balEl = document.getElementById("bal");

function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
}
window.addEventListener("resize", resize);
resize();

function genCrash() {
    let r = Math.random();
    if (r < 0.1) return 1.00; // Instant crash
    if (r < 0.5) return (1 + Math.random() * 1.5).toFixed(2);
    return (1 + Math.random() * 10).toFixed(2);
}

function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    if (pathPts.length < 2) return;

    ctx.beginPath();
    ctx.setLineDash([]);
    ctx.strokeStyle = isFlying ? "#8bb9ff" : "#ff3b3b";
    ctx.lineWidth = 4;
    ctx.moveTo(pathPts[0].x, pathPts[0].y);

    for (let i = 1; i < pathPts.length; i++) {
        ctx.lineTo(pathPts[i].x, pathPts[i].y);
    }
    ctx.stroke();

    // Plane Position
    const lastPt = pathPts[pathPts.length - 1];
    planeEl.style.transform = `translate(${lastPt.x}px, ${lastPt.y}px) rotate(-15deg)`;
}

function startRound() {
    if (isFlying) return;
    isFlying = true;
    mult = 1.00;
    crashPt = genCrash();
    pathPts = [{x: 0, y: canvas.height - 20}];
    hasCashed1 = false; hasCashed2 = false;
    multEl.classList.remove("crashed");
    
    let startTime = Date.now();
    
    let loop = setInterval(() => {
        if (!isFlying) { clearInterval(loop); return; }
        
        let elapsed = (Date.now() - startTime) / 1000;
        mult = parseFloat((1 + 0.1 * Math.pow(elapsed, 2)).toFixed(2));
        multEl.innerText = mult.toFixed(2) + "x";

        // Update Path
        let x = Math.min(elapsed * 40, canvas.width - 50);
        let y = (canvas.height - 20) - (Math.pow(elapsed, 1.5) * 15);
        pathPts.push({x, y});
        
        draw();

        if (mult >= crashPt) {
            clearInterval(loop);
            doCrash();
        }
    }, 50);
}

function doCrash() {
    isFlying = false;
    multEl.classList.add("crashed");
    multEl.innerText = "FLEW AWAY!";
    
    // Reset Buttons
    if (betPlaced1 && !hasCashed1) resetBetBtn(1);
    if (betPlaced2 && !hasCashed2) resetBetBtn(2);
    
    betPlaced1 = false; betPlaced2 = false;

    setTimeout(() => {
        multEl.innerText = "1.00x";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pathPts = [];
        startRound();
    }, 3000);
}

function handleBet(panel) {
    if (!isFlying) {
        // Place bet for next round
        let amt = panel === 1 ? parseFloat(document.getElementById("amt").value) : parseFloat(document.getElementById("amt2").value);
        if (coins >= amt) {
            coins -= amt;
            if (panel === 1) { betAmt1 = amt; betPlaced1 = true; updateBtn(1, "WAITING"); }
            else { betAmt2 = amt; betPlaced2 = true; updateBtn(2, "WAITING"); }
            updateBal();
        }
    } else {
        // Cashout logic
        if (panel === 1 && betPlaced1 && !hasCashed1) {
            cashOut(1, betAmt1);
        } else if (panel === 2 && betPlaced2 && !hasCashed2) {
            cashOut(2, betAmt2);
        }
    }
}

function cashOut(panel, amt) {
    let win = amt * mult;
    coins += win;
    updateBal();
    if (panel === 1) { hasCashed1 = true; updateBtn(1, `WIN ${win.toFixed(2)}`); }
    else { hasCashed2 = true; updateBtn(2, `WIN ${win.toFixed(2)}`); }
    
    Swal.fire({
        title: `+${win.toFixed(2)}`,
        timer: 1000,
        showConfirmButton: false,
        background: 'rgba(0, 255, 136, 0.9)',
        position: 'top'
    });
}

function updateBtn(p, txt) {
    let b = document.getElementById(p === 1 ? "betBtn" : "betBtn2");
    b.innerText = txt;
    b.classList.add("cancel");
}

function resetBetBtn(p) {
    let b = document.getElementById(p === 1 ? "betBtn" : "betBtn2");
    b.innerText = "BET";
    b.classList.remove("cancel");
}

function updateBal() { balEl.innerText = coins.toFixed(2); }

// UI Helpers
function changeAmt(v) { let i = document.getElementById("amt"); i.value = (parseFloat(i.value) + v).toFixed(2); }
function setAmt(v) { document.getElementById("amt").value = v.toFixed(2); }
function changeAmt2(v) { let i = document.getElementById("amt2"); i.value = (parseFloat(i.value) + v).toFixed(2); }
function setAmt2(v) { document.getElementById("amt2").value = v.toFixed(2); }

// Start
setTimeout(startRound, 1000);
</script>
</body>
</html>
