<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>KingMaker Crash</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;margin:0;padding:0}
.header{background:#0b1018;padding:12px;border-bottom:2px solid #b8860b;text-align:center}
.balance{color:#ffd700;font-size:20px;font-weight:900}
.gameBox{padding:16px}

/* FAKE TICKER PATTI */
#winTicker{background:#000;border-bottom:2px solid #ffd700;padding:6px 0;overflow:hidden;white-space:nowrap}
#tickerContent{display:inline-block;animation:scroll 40s linear infinite;color:#10b981;font-weight:700;font-size:13px}
@keyframes scroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* LEADERBOARD */
.leaderBox{background:#0b1018;border:2px solid #ffd700;border-radius:12px;margin:16px;padding:12px}
.leaderTitle{text-align:center;color:#ffd700;font-size:18px;font-weight:900;margin-bottom:8px}
.top1{background:linear-gradient(45deg,#ffd700,#ff8c00);color:#000;padding:12px;border-radius:8px;margin-bottom:10px;text-align:center;font-weight:900}
.top1.date{font-size:12px;color:#333}
.leaderItem{display:flex;justify-content:space-between;padding:8px;border-bottom:1px solid #333;font-size:14px}
.leaderItem:last-child{border-bottom:none}
.flag{font-size:18px;margin-right:6px}

button{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:none;background:#ffd700;color:#000;font-weight:900;font-size:16px}
input{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff}
</style>
</head>
<body>

<!-- 1. FAKE WITHDRAWAL PATTI -->
<div id="winTicker">
  <div id="tickerContent"></div>
</div>

<!-- 2. HEADER -->
<div class="header">
  <div>Balance: <span class="balance" id="userBalance">0 PKR</span></div>
</div>

<!-- 3. FAKE LEADERBOARD TOP 10 -->
<div class="leaderBox">
  <div class="leaderTitle">🏆 TODAY'S TOP WINNERS 🏆</div>
  <div class="top1" id="top1Box">
    <div style="font-size:22px">👑 #1 WINNER 👑</div>
    <div id="top1Name">Loading...</div>
    <div class="date" id="todayDate"></div>
  </div>
  <div id="top10List"></div>
</div>

<!-- 4. GAME AREA -->
<div class="gameBox">
  <h2 style="color:#ffd700;text-align:center">Crash Game</h2>
  <input id="betAmount" type="number" placeholder="Bet Amount">
  <button onclick="placeBet()">BET</button>
  <button onclick="cashOut()">CASH OUT</button>
  <div style="text-align:center;font-size:48px;color:#10b981;margin:20px 0" id="multiplier">1.00x</div>

  <!-- DEPOSIT INFO FIX - Yahan show hoga -->
  <div style="background:#0b1018;padding:12px;border-radius:8px;margin-top:20px;border:1px solid #b8860b">
    <b style="color:#ffd700">Deposit Info:</b>
    <div id="depositInfo" style="color:#10b981;margin-top:8px">Loading...</div>
  </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,onValue}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
  authDomain: "kingmaker-crash.firebaseapp.com",
  databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
  projectId: "kingmaker-crash",
  storageBucket: "kingmaker-crash.firebasestorage.app",
  messagingSenderId: "327400668393",
  appId: "1:327400668393:web:0d02a340b9f5603f524478"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app),db=getDatabase(app);

// 1. DEPOSIT INFO FIX - [object Object] ka solution
onValue(ref(db,'admin/payment_info'),s=>{
  let d=s.val();
  if(d && d.type){
    document.getElementById('depositInfo').innerHTML = `${d.type}: <b>${d.number}</b><br>Name: <b>${d.name}</b>`;
  } else {
    document.getElementById('depositInfo').innerText = 'Payment info not set';
  }
});

// 2. USER BALANCE
onAuthStateChanged(auth,u=>{
  if(u){
    onValue(ref(db,`users/${u.uid}/balance`),s=>{
      document.getElementById('userBalance').innerText = (s.val()||0) + ' PKR';
    });
  }
});

// 3. FAKE WITHDRAWAL TICKER
const fakeWins = [
  "🔥 Ali 🇵🇰 ne 15,000 PKR jeete!",
  "💰 Fatima 🇸🇦 ne 8,500 PKR withdraw kiye!",
  "🚀 John 🇺🇸 ne 50,000 PKR ka Cash Out!",
  "💎 Ayesha 🇦🇪 ne 22,300 PKR jeete!",
  "⚡ Usman 🇵🇰 ne 1,20,000 PKR withdraw kiye!",
  "👑 Sarah 🇬🇧 ne 45,000 PKR ka Jackpot!",
  "🎯 Ahmed 🇶🇦 ne 9,800 PKR jeete!",
  "💵 Maria 🇹🇷 ne 67,000 PKR withdraw kiye!"
];
document.getElementById('tickerContent').innerHTML = fakeWins.join(" &nbsp;&nbsp;●&nbsp;&nbsp; ") + " &nbsp;&nbsp;●&nbsp;&nbsp; " + fakeWins.join(" &nbsp;&nbsp;●&nbsp;&nbsp; ");

// 4. FAKE LEADERBOARD TOP 10 - Har 5 second mein change
const fakeNames = ["Ali Khan","Sara Ahmed","Usman Ali","Fatima Noor","Ahmed Raza","Ayesha Malik","Bilal Shah","Zara Sheikh","Hassan Jan","Mariam Bibi","John Smith","Li Wei","Omar Farooq"];
const flags = ["🇵🇰","🇸🇦","🇦🇪","🇺🇸","🇬🇧","🇹🇷","🇶🇦","🇮🇳","🇧🇩","🇨🇳"];
const amounts = [150000,120000,98000,85000,67000,50000,45000,32000,25000,18000];

function updateLeaderboard(){
  // Date
  document.getElementById('todayDate').innerText = new Date().toLocaleDateString('en-GB');

  // Top 1 Random
  let top1Name = fakeNames[Math.floor(Math.random()*fakeNames.length)];
  let top1Flag = flags[Math.floor(Math.random()*flags.length)];
  let top1Amount = amounts[0] + Math.floor(Math.random()*10000);
  document.getElementById('top1Name').innerHTML = `${top1Flag} ${top1Name} - ${top1Amount.toLocaleString()} PKR`;

  // Top 2-10 Random
  let html = '';
  for(let i=1; i<10; i++){
    let name = fakeNames[Math.floor(Math.random()*fakeNames.length)];
    let flag = flags[Math.floor(Math.random()*flags.length)];
    let amount = amounts[i] + Math.floor(Math.random()*5000);
    html += `<div class="leaderItem">
      <span><span class="flag">${flag}</span> #${i+1} ${name}</span>
      <span style="color:#10b981;font-weight:700">${amount.toLocaleString()} PKR</span>
    </div>`;
  }
  document.getElementById('top10List').innerHTML = html;
}
updateLeaderboard();
setInterval(updateLeaderboard, 5000); // Har 5 sec mein names change

// GAME FUNCTIONS - Ye tumhare purane code se lena
window.placeBet=()=>{Swal.fire("Demo","Game logic yahan lagao","info")};
window.cashOut=()=>{Swal.fire("Demo","Cash out logic yahan lagao","info")};
</script>
</body>
</html>
