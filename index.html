<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker Crash - Live</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; overflow: hidden; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid #333; }
        .rocket-animate { animation: fly 1s infinite ease-in-out; }
        @keyframes fly { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        .crashed { color: #ef4444; animation: shake 0.1s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px); } 50% { transform: translate(-1px, -1px); } }
    </style>
</head>
<body>

    <div class="p-6 glass flex justify-between items-center">
        <div>
            <p class="text-[10px] text-gray-500 font-bold uppercase">Balance</p>
            <h1 class="text-3xl font-black text-yellow-500">RS <span id="user-balance">0.00</span></h1>
        </div>
        <div id="status-tag" class="bg-blue-600/20 text-blue-400 text-[10px] px-3 py-1 rounded-full border border-blue-500/30 font-bold uppercase">Waiting for Admin...</div>
    </div>

    <div class="p-4 max-w-lg mx-auto">
        <div class="bg-gray-900 rounded-[2.5rem] p-8 mb-6 border border-gray-800 relative h-72 flex flex-col items-center justify-center">
            <div id="rocket-icon" class="text-8xl mb-2">🚀</div>
            <h1 id="multiplier" class="text-7xl font-black text-green-500 font-mono text-center">1.00x</h1>
        </div>

        <div class="bg-gray-900 p-6 rounded-[2.5rem] border border-gray-800 mb-4">
            <p class="text-[10px] text-gray-500 font-bold mb-2 uppercase">Bet Amount (PKR)</p>
            <input id="bet-amount" type="number" value="300" class="w-full bg-transparent text-5xl font-black outline-none border-b border-gray-800 text-yellow-500">
        </div>

        <button onclick="placeBet()" id="btn-bet" class="w-full bg-green-600 h-20 rounded-[2rem] font-black text-2xl uppercase shadow-lg active:scale-95 transition-all">Place Bet</button>
        <button onclick="cashOut()" id="btn-cashout" class="hidden w-full bg-yellow-500 h-20 rounded-[2rem] font-black text-2xl uppercase text-black shadow-lg active:scale-95 transition-all">Cash Out</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-auth.js";

        // YAHAN APNA PURANA CONFIG DALEN
        const firebaseConfig = {
            apiKey: "AIzaSyCM_qmcvOXXjJrQHPiracy5SOpTjAJEnYU",
            authDomain: "trade-for-profit-8b160.firebaseapp.com",
            databaseURL: "https://trade-for-profit-8b160-default-rtdb.firebaseio.com",
            projectId: "trade-for-profit-8b160",
            storageBucket: "trade-for-profit-8b160.firebasestorage.app",
            messagingSenderId: "1077014018991",
            appId: "1:1077014018991:web:24f051595ac36857fd4d5a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        let uBal = 0, uID = "", currentBet = 0, isPlaying = false, myGameStatus = "idle";

        onAuthStateChanged(auth, (user) => {
            if(user) { uID = user.uid; onValue(ref(db, `users/${uID}/balance`), s => { uBal = s.val() || 0; document.getElementById('user-balance').innerText = uBal.toLocaleString(); }); }
        });

        // LISTENING TO ADMIN
        onValue(ref(db, 'gameSystem'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            if(data.state === "START") {
                document.getElementById('multiplier').innerText = data.multiplier.toFixed(2) + "x";
                document.getElementById('multiplier').classList.remove('crashed');
                document.getElementById('rocket-icon').innerText = "🚀";
                document.getElementById('rocket-icon').classList.add('rocket-animate');
                document.getElementById('status-tag').innerText = "LIVE NOW";
            } 
            else if(data.state === "CRASHED") {
                document.getElementById('multiplier').innerText = data.lastCrash.toFixed(2) + "x";
                document.getElementById('multiplier').classList.add('crashed');
                document.getElementById('rocket-icon').innerText = "💥";
                document.getElementById('rocket-icon').classList.remove('rocket-animate');
                document.getElementById('status-tag').innerText = "CRASHED!";
                resetPlayerState();
            }
        });

        window.placeBet = () => {
            const amt = parseInt(document.getElementById('bet-amount').value);
            if(amt > uBal) return alert("Low Balance!");
            currentBet = amt;
            uBal -= amt;
            update(ref(db, `users/${uID}`), { balance: uBal });
            document.getElementById('btn-bet').classList.add('hidden');
            document.getElementById('btn-cashout').classList.remove('hidden');
            myGameStatus = "betting";
        };

        window.cashOut = async () => {
            if(myGameStatus !== "betting") return;
            const snap = await get(ref(db, 'gameSystem/multiplier'));
            const mult = snap.val();
            const win = currentBet * mult;
            uBal += win;
            update(ref(db, `users/${uID}`), { balance: uBal });
            alert(`You Won RS ${win.toFixed(2)}!`);
            resetPlayerState();
        };

        function resetPlayerState() {
            myGameStatus = "idle";
            document.getElementById('btn-bet').classList.remove('hidden');
            document.getElementById('btn-cashout').classList.add('hidden');
        }
    </script>
</body>
              </html>
