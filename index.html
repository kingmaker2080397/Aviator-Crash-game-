<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kingmaker - Fixed Spin</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background: #0f172a; color: white; font-family: 'Poppins', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .game-card { background: rgba(255,255,255,0.05); backdrop-filter: blur(20px); border-radius: 30px; padding: 25px; width: 350px; text-align: center; border: 1px solid rgba(255,255,255,0.1); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .bal-tag { background: #1e293b; padding: 8px 15px; border-radius: 12px; border: 1px solid #334155; }
        .wheel-container { position: relative; width: 300px; height: 300px; margin: 20px auto; }
        #wheelCanvas { width: 100%; height: 100%; border-radius: 50%; border: 8px solid #334155; transition: transform 5s cubic-bezier(0.1, 0, 0.1, 1); }
        .pointer { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 45px; z-index: 100; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.5)); }
        .spin-btn { background: linear-gradient(45deg, #06b6d4, #3b82f6); border: none; width: 100%; padding: 15px; border-radius: 15px; color: white; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 10px 20px rgba(6, 182, 212, 0.3); }
        .logout-btn { background: #ef4444; border: none; color: white; padding: 5px 10px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="game-card">
    <div class="top-bar">
        <div class="bal-tag">Balance: <span id="balance" style="color:#22d3ee; font-weight:bold;">0</span></div>
        <button class="logout-btn" id="logoutBtn">Logout</button>
    </div>

    <div class="wheel-container">
        <img src="https://cdn-icons-png.flaticon.com/512/8155/8155940.png" class="pointer">
        <canvas id="wheelCanvas" width="500" height="500"></canvas>
    </div>

    <button class="spin-btn" id="spinBtn">SPIN NOW</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
        authDomain: "kingmaker-crash.firebaseapp.com",
        databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
        projectId: "kingmaker-crash",
        storageBucket: "kingmaker-crash.firebasestorage.app",
        messagingSenderId: "327400668393",
        appId: "1:327400668393:web:0d02a340b9f5603f524478"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const canvas = document.getElementById("wheelCanvas");
    const ctx = canvas.getContext("2d");
    
    // Values exactly as per your original wheel image
    const segments = ["Rs.5", "Rs.1000", "Rs.5000", "Rs.20", "Rs.1000", "Rs.2", "Rs.100", "Rs.5"];
    const colors = ["#ff7675", "#74b9ff", "#55efc4", "#ffeaa7", "#a29bfe", "#fd79a8", "#81ecec", "#fab1a0"];

    function drawWheel() {
        const segmentAngle = (2 * Math.PI) / segments.length;
        segments.forEach((text, i) => {
            ctx.beginPath();
            ctx.fillStyle = colors[i];
            ctx.moveTo(250, 250);
            ctx.arc(250, 250, 240, i * segmentAngle, (i + 1) * segmentAngle);
            ctx.fill();
            ctx.stroke();

            // Draw text on segments
            ctx.save();
            ctx.translate(250, 250);
            ctx.rotate(i * segmentAngle + segmentAngle / 2);
            ctx.fillStyle = "black";
            ctx.font = "bold 22px Arial";
            ctx.fillText(text, 110, 10);
            ctx.restore();
        });
    }
    drawWheel();

    let rotation = 0;
    onAuthStateChanged(auth, user => {
        if (!user) window.location.href = "login.html";
        onValue(ref(db, `users/${user.uid}/balance`), s => {
            document.getElementById("balance").innerText = s.val() || 0;
        });
    });

    document.getElementById("spinBtn").onclick = function() {
        this.disabled = true;
        const extraSpin = Math.floor(Math.random() * 360) + 3600; // 10 full rounds + random
        rotation += extraSpin;
        canvas.style.transform = `rotate(${rotation}deg)`;

        setTimeout(() => {
            // Calculation logic to match Pointer (Top Center)
            const actualRotation = rotation % 360;
            const index = Math.floor(((360 - (actualRotation % 360) + 270) % 360) / 45);
            const winValue = segments[index];

            Swal.fire({
                title: 'Mubarak Ho!',
                text: `Aap ${winValue} Jeet Gaye Hain!`,
                icon: 'success',
                confirmButtonText: 'Balance Mein Add Karein'
            }).then(() => {
                push(ref(db, 'requests'), {
                    uid: auth.currentUser.uid,
                    email: auth.currentUser.email,
                    amount: winValue.replace('Rs.', ''),
                    status: 'pending',
                    type: 'Spin Win'
                });
            });
            this.disabled = false;
        }, 5000);
    };

    document.getElementById("logoutBtn").onclick = () => signOut(auth).then(() => window.location.reload());
</script>
</body>
</html>
