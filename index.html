<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Wallet</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;padding:20px;margin:0;text-align:center}
.box{background:#0b1018;border:1px solid #b8860b;padding:20px;border-radius:12px;margin:10px 0}
h1{color:#ffd700}
input,button{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;font-size:16px}
button{background:#ffd700;color:#000;font-weight:900;cursor:pointer}
.bal{font-size:32px;font-weight:900;color:#ffd700;margin:10px 0}
.tab{display:flex;gap:8px;margin:20px 0}
.tab button{flex:1;background:#000;color:#999}
.tab button.active{background:#ffd700;color:#000}
.num{color:#10b981;font-weight:900;font-size:18px;background:#000;padding:12px;border-radius:8px;border:1px solid #10b981;word-break:break-all}
.fileBtn{background:#0088cc;color:#fff;border:none}
.teleBtn{background:#0088cc;color:#fff;margin-top:10px}
</style>
</head>
<body>
<div class="box">
<h1>💰 WALLET</h1>
<div class="bal">Rs. <span id="bal">0</span></div>
<button onclick="location.href='./index.html'">BACK TO GAME</button>
</div>

<div class="tab">
<button id="depBtn" class="active" onclick="showTab('dep')">DEPOSIT</button>
<button id="withBtn" onclick="showTab('with')">WITHDRAW</button>
</div>

<div id="depBox" class="box">
<h3>💳 Deposit</h3>
<p>Send to Admin Number:</p>
<div class="num" id="adminNum" style="color:#ffd700;border-color:#ffd700">Loading...</div>
<button class="fileBtn" onclick="document.getElementById('screenshot').click()">📸 UPLOAD SCREENSHOT</button>
<input id="screenshot" type="file" accept="image/*" style="display:none">
<div id="fileName" style="color:#10b981;font-size:12px;margin:5px 0"></div>
<input id="depAmt" type="number" placeholder="Amount (Min 100)" min="100">
<input id="trxId" placeholder="Transaction ID">
<button onclick="reqDeposit()">SUBMIT DEPOSIT</button>
<button class="teleBtn" onclick="window.open('https://t.me/+Tn9bUflQQtVlNGZk','_blank')">💬 JOIN TELEGRAM GROUP</button>
</div>

<div id="withBox" class="box" style="display:none">
<h3>💸 Withdraw</h3>
<p>Your Saved Number:</p>
<div class="num" id="userNum">Loading...</div>
<input id="withAmt" type="number" placeholder="Amount (Min 100)" min="100">
<button onclick="reqWithdraw()">SUBMIT WITHDRAW</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,onValue,push,update}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",authDomain:"kingmaker-crash.firebaseapp.com",databaseURL:"https://kingmaker-crash-default-rtdb.firebaseio.com",projectId:"kingmaker-crash",storageBucket:"kingmaker-crash.firebasestorage.app",messagingSenderId:"327400668393",appId:"1:327400668393:web:0d02a340b9f5603f524478"});
const auth=getAuth(app),db=getDatabase(app);
let ub=0,userNum="",adminPaymentData=null,adminNumberForCopy="";

const TELEGRAM_BOT_TOKEN = "PASTE_YOUR_BOT_TOKEN_HERE";
const TELEGRAM_CHAT_ID = "-100PASTE_YOUR_CHAT_ID_HERE";

onAuthStateChanged(auth,u=>{
if(!u)return location.replace("./login.html");
onValue(ref(db,`users/${u.uid}/balance`),s=>{ub=s.val()||0;document.getElementById('bal').innerText=ub.toLocaleString()});
onValue(ref(db,`users/${u.uid}/withdraw_number`),s=>{userNum=s.val()||"Not Set";document.getElementById('userNum').innerText=userNum});
});

// SMART DEPOSIT INFO - STRING YA OBJECT DONO CHALEGA
onValue(ref(db,'admin/payment_info'),s=>{
  adminPaymentData=s.val();
  let displayText = 'Not Set by Admin';

  if(adminPaymentData){
    // Agar object hai to
    if(typeof adminPaymentData === 'object' && adminPaymentData.type){
      displayText = `${adminPaymentData.type}: <b>${adminPaymentData.number}</b><br>Name: <b>${adminPaymentData.name}</b>`;
      adminNumberForCopy = adminPaymentData.number;
    }
    // Agar string hai to
    else if(typeof adminPaymentData === 'string'){
      displayText = adminPaymentData;
      // String mein se number nikalne ki koshish
      let match = adminPaymentData.match(/\d{10,11}/);
      adminNumberForCopy = match? match[0] : adminPaymentData;
    }
    // Agar number direct hai to
    else if(typeof adminPaymentData === 'number'){
      displayText = adminPaymentData;
      adminNumberForCopy = adminPaymentData;
    }
  }
  document.getElementById('adminNum').innerHTML = displayText;
});

document.getElementById('screenshot').onchange=function(e){
  let fileName = e.target.files[0]? e.target.files[0].name : '';
  document.getElementById('fileName').innerText = fileName? `Selected: ${fileName}` : '';
};

window.showTab=t=>{
document.getElementById('depBox').style.display=t==='dep'?'block':'none';
document.getElementById('withBox').style.display=t==='with'?'block':'none';
document.getElementById('depBtn').classList.toggle('active',t==='dep');
document.getElementById('withBtn').classList.toggle('active',t==='with');
};

window.reqDeposit=async()=>{
let a=parseFloat(document.getElementById('depAmt').value);
let tr=document.getElementById('trxId').value.trim();
let file=document.getElementById('screenshot').files[0];

if(!a||a<100)return Swal.fire("Error","Min 100 PKR daalo","error");
if(!tr)return Swal.fire("Error","Transaction ID daalo","error");
if(!file)return Swal.fire("Error","Screenshot upload karo","error");

Swal.fire({title:"Uploading...",text:"Request bhej rahe hain",allowOutsideClick:false,didOpen:()=>Swal.showLoading()});

await push(ref(db,'requests'),{
  uid:auth.currentUser.uid,
  email:auth.currentUser.email,
  type:'deposit',
  amount:a,
  trx:tr,
  admin_number:adminNumberForCopy||'N/A',
  status:'pending',
  timestamp:Date.now()
});

if(TELEGRAM_BOT_TOKEN!== "PASTE_YOUR_BOT_TOKEN_HERE"){
  let formData = new FormData();
  formData.append('chat_id', TELEGRAM_CHAT_ID);
  formData.append('photo', file);
  formData.append('caption', `🔥 NEW DEPOSIT\n\n💰 Amount: ${a} PKR\n📧 Email: ${auth.currentUser.email}\n🆔 TRX: ${tr}`);
  try{await fetch(`https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendPhoto`,{method:'POST',body:formData});}catch(e){}
}

Swal.fire("Sent!","Deposit request admin ko bhej di","success");
document.getElementById('depAmt').value='';
document.getElementById('trxId').value='';
document.getElementById('screenshot').value='';
document.getElementById('fileName').innerText='';
};

window.reqWithdraw=async()=>{
let a=parseFloat(document.getElementById('withAmt').value);
if(!a||a<100)return Swal.fire("Error","Min 100","error");
if(a>ub)return Swal.fire("Error","Balance kam hai","error");
if(userNum==="Not Set"||userNum==="Loading...")return Swal.fire("Error","Index page pe jaake number save karo","error");
await update(ref(db,`users/${auth.currentUser.uid}`),{balance:ub-a});
await push(ref(db,'requests'),{uid:auth.currentUser.uid,email:auth.currentUser.email,type:'withdraw',amount:a,user_number:userNum,status:'pending',timestamp:Date.now()});
Swal.fire("Sent!","Withdraw request sent","success");
document.getElementById('withAmt').value='';
};
</script>
</body>
  </html>
