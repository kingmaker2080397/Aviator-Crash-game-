<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo Golden Scatter</title>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #ffd700;
            --gold-glow: rgba(255, 215, 0, 0.4);
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.18);
        }
        * { box-sizing: border-box; }
        body {
            background: #0a0e1a url('https://images.unsplash.com/photo-1519681393784-d120267933ba?q=80&w=2070') center/cover fixed;
            color: white;
            font-family: 'Poppins', sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: grid;
            place-items: center;
        }
        h2 {
            font-size: 2rem;
            font-weight: 700;
            text-shadow: 0 0 20px var(--gold-glow);
            margin-bottom: 20px;
        }
      .machine-body {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 340px;
            margin: 0 auto;
            padding: 25px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.37), inset 0 1px 0 rgba(255,255,255,0.1);
        }
      .stats {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            font-weight: 600;
        }
      .screen {
            background: rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-around;
            padding: 25px 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
            box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);
        }
      .slot {
            font-size: 3.5rem;
            font-weight: 700;
            color: #fff;
            width: 75px;
            height: 95px;
            line-height: 95px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-shadow: 0 0 15px rgba(255,255,255,0.5);
            transition: transform 0.1s ease;
        }
      .slot.spinning {
            animation: spinBlur 0.1s linear infinite;
        }
        @keyframes spinBlur {
            0% { transform: translateY(-5px); filter: blur(2px); }
            50% { transform: translateY(5px); filter: blur(2px); }
            100% { transform: translateY(-5px); filter: blur(2px); }
        }
      .slot.win {
            animation: glow 0.8s ease-in-out infinite alternate;
        }
        @keyframes glow {
            from { box-shadow: 0 0 10px var(--gold); transform: scale(1); }
            to { box-shadow: 0 0 25px var(--gold), 0 0 40px var(--gold-glow); transform: scale(1.05); }
        }
      .btn-spin {
            background: linear-gradient(135deg, #ffd700, #ffae00);
            border: none;
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(255, 174, 0, 0.4);
            width: 100%;
            color: #000;
            transition: all 0.2s ease;
        }
      .btn-spin:active:not(:disabled) {
            transform: translateY(2px);
            box-shadow: 0 2px 10px rgba(255, 174, 0, 0.4);
        }
      .btn-spin:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }
      .demo-badge {
            background: rgba(255,0,0,0.3);
            border: 1px solid red;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <div>
        <div class="demo-badge">DEMO MODE - NO REAL MONEY</div>
        <h2>🎰 GOLDEN SCATTER 🎰</h2>

        <div class="machine-body">
            <div class="stats">
                <div>Coins: <b id="balance">1000</b></div>
                <div style="color: var(--gold);">Win: <span id="last-win">0</span></div>
            </div>

            <div class="screen">
                <div id="s1" class="slot">❓</div>
                <div id="s2" class="slot">❓</div>
                <div id="s3" class="slot">❓</div>
            </div>

            <button class="btn-spin" id="spinBtn">SPIN (50 Coins)</button>
        </div>
    </div>

<script>
    let coins = 1000;
    const slots = [document.getElementById('s1'), document.getElementById('s2'), document.getElementById('s3')];
    const spinBtn = document.getElementById('spinBtn');
    const balanceEl = document.getElementById('balance');
    const lastWinEl = document.getElementById('last-win');

    // Sound effects using Web Audio API - no external files needed
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playTick() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.frequency.value = 800;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.1);
    }

    function playWin() {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523, audioCtx.currentTime); // C5
        osc.frequency.setValueAtTime(659, audioCtx.currentTime + 0.1); // E5
        osc.frequency.setValueAtTime(784, audioCtx.currentTime + 0.2); // G5
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
        osc.start(audioCtx.currentTime);
        osc.stop(audioCtx.currentTime + 0.5);
    }

    spinBtn.onclick = function() {
        if (coins < 50) return Swal.fire("Oops", "Coins khatam ho gaye! Page refresh karo.", "error");

        coins -= 50;
        balanceEl.innerText = coins;
        this.disabled = true;
        this.innerText = "SPINNING...";
        slots.forEach(s => {
            s.classList.remove('win');
            s.classList.add('spinning');
        });

        // Spinning sound + animation
        let ticks = 0;
        let timer = setInterval(() => {
            slots.forEach(s => s.innerText = Math.floor(Math.random()*10));
            playTick();
            ticks++;
            if(ticks > 25) clearInterval(timer);
        }, 80);

        setTimeout(() => {
            clearInterval(timer);
            slots.forEach(s => s.classList.remove('spinning'));

            // Random result - no rigging
            const finalIcons = [
                Math.floor(Math.random()*10),
                Math.floor(Math.random()*10),
                Math.floor(Math.random()*10)
            ];

            slots[0].innerText = finalIcons[0];
            slots[1].innerText = finalIcons[1];
            slots[2].innerText = finalIcons[2];

            if(finalIcons[0] == finalIcons[1] && finalIcons[1] == finalIcons[2]) {
                let winAmt = 500;
                coins += winAmt;
                balanceEl.innerText = coins;
                lastWinEl.innerText = winAmt;
                slots.forEach(s => s.classList.add('win'));
                playWin();
                Swal.fire("JACKPOT!", `You won ${winAmt} coins!`, "success");
            } else {
                lastWinEl.innerText = "0";
            }

            spinBtn.disabled = false;
            spinBtn.innerText = "SPIN (50 Coins)";
        }, 2500);
    };
</script>
</body>
</html>
