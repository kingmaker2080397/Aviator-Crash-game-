<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Jaanu Ludo</title>
    <link rel="stylesheet" href="style.css">
    <style>
        table { width: 100%; border-collapse: collapse; }
        td, th { border: 1px solid #ddd; padding: 8px; }
        .btn { padding: 5px 10px; margin: 2px; }
    </style>
</head>
<body>
    <h2>Admin Panel</h2>
    
    <h3>User ko Coin Do</h3>
    <input type="text" id="userUID" placeholder="User ka UID ya Email">
    <input type="number" id="coinAmount" placeholder="Kitne coins">
    <button onclick="sendCoins()">Bhej Do</button>
    
    <h3>Sabhi Users</h3>
    <table id="userTable">
        <tr><th>Email</th><th>Coins</th><th>Status</th><th>Action</th></tr>
    </table>

    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="app.js"></script>
    <script>
        // Sab users load karo
        db.collection("users").onSnapshot((snapshot) => {
            let table = document.getElementById('userTable');
            table.innerHTML = '<tr><th>Email</th><th>Coins</th><th>Status</th><th>Action</th></tr>';
            
            snapshot.forEach((doc) => {
                let user = doc.data();
                let row = `<tr>
                    <td>${user.email}</td>
                    <td>${user.coins}</td>
                    <td>${user.blocked ? 'Blocked' : 'Active'}</td>
                    <td>
                        <button class="btn" onclick="blockUser('${doc.id}', ${!user.blocked})">
                            ${user.blocked ? 'Unblock' : 'Block'}
                        </button>
                    </td>
                </tr>`;
                table.innerHTML += row;
            });
        });

        function sendCoins() {
            let email = document.getElementById('userUID').value;
            let amount = parseInt(document.getElementById('coinAmount').value);
            
            db.collection("users").where("email", "==", email).get().then((query) => {
                query.forEach((doc) => {
                    db.collection("users").doc(doc.id).update({
                        coins: firebase.firestore.FieldValue.increment(amount)
                    });
                    alert("Coin bhej diye bhai!");
                });
            });
        }

        function blockUser(uid, status) {
            db.collection("users").doc(uid).update({ blocked: status });
        }
    </script>
</body>
</html>
