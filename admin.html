<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="padding:20px; font-family:sans-serif;">
    <h1>Admin: Approve Requests</h1>
    <div id="reqList">Loading...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Same as index.html */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'requests'), (snap) => {
        const div = document.getElementById('reqList');
        div.innerHTML = "";
        snap.forEach(child => {
            const data = child.val();
            if(data.status === 'pending') {
                div.innerHTML += `
                <div style="border:1px solid #000; padding:10px; margin:10px;">
                    User: ${data.email} | ${data.type} | Rs.${data.amount}
                    <button onclick="process('${child.key}', '${data.uid}', ${data.amount}, '${data.type}')">Approve</button>
                </div>`;
            }
        });
    });

    window.process = (id, uid, amt, type) => {
        const userBalRef = ref(db, `users/${uid}/balance`);
        runTransaction(userBalRef, (curr) => {
            return type === 'deposit' ? (curr || 0) + amt : (curr || 0) - amt;
        }).then(() => {
            update(ref(db, `requests/${id}`), { status: 'approved' });
        });
    };
</script>
</body>
</html>
