<!DOCTYPE html>
<html>
<head>
    <title>Owner Dashboard</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; padding: 20px; }
        .box { background: #1a1f2e; padding: 20px; border-radius: 15px; border: 1px solid #ffd700; margin-bottom: 20px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #ffd700; font-weight: bold; cursor: pointer; }
        .req { border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <h1>👑 ADMIN CONTROL PANEL</h1>

    <div class="box">
        <h3>🎯 Rig Next Spin (Select Result)</h3>
        <select id="res">
            <option value="2">Rs. 2</option>
            <option value="5">Rs. 5</option>
            <option value="20">Rs. 20</option>
            <option value="100">Rs. 100</option>
            <option value="1000">Rs. 1000</option>
            <option value="5000">Rs. 5000</option>
        </select>
        <button onclick="setRes()">Lock Result</button>
    </div>

    <div class="box">
        <h3>💳 Update Deposit Number</h3>
        <input id="num" placeholder="EasyPaisa Number">
        <button onclick="setNum()">Save Number</button>
    </div>

    <div class="box">
        <h3>📩 Pending Approvals</h3>
        <div id="list">Loading...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Same Config */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.setRes = () => { set(ref(db, 'admin/next_result'), document.getElementById('res').value); alert("Locked!"); };
    window.setNum = () => { set(ref(db, 'admin/payment_info'), document.getElementById('num').value); alert("Updated!"); };

    onValue(ref(db, 'requests'), snap => {
        const div = document.getElementById("list"); div.innerHTML = "";
        snap.forEach(c => {
            const d = c.val();
            if(d.status === 'pending') {
                div.innerHTML += `<div class="req">${d.email} - Rs.${d.amount} <button onclick="appr('${c.key}','${d.uid}',${d.amount})" style="width:auto;">OK</button></div>`;
            }
        });
    });

    window.appr = async (key, uid, amt) => {
        const s = await get(ref(db, `users/${uid}/balance`));
        await update(ref(db, `users/${uid}`), { balance: (s.val() || 0) + parseFloat(amt) });
        await update(ref(db, `requests/${key}`), { status: 'approved' });
        alert("Done!");
    };
</script>
</body>
</html>
