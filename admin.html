<!DOCTYPE html>
<html>
<body style="background:#0b0f1a; color:white; font-family:sans-serif; padding:20px;">
    <h2 style="color:#ffd700;">Admin Dashboard</h2>
    <div id="list">Checking Requests...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Same as above */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'requests'), (snap) => {
        const div = document.getElementById("list");
        div.innerHTML = "";
        if(!snap.exists()) { div.innerHTML = "No requests found."; return; }
        
        snap.forEach(child => {
            const d = child.val();
            if(d.status === 'pending') {
                div.innerHTML += `
                <div style="background:#1a1f2e; padding:15px; margin-bottom:10px; border-radius:10px; border:1px solid #333;">
                    ${d.email} won <b>Rs.${d.amount}</b>
                    <br><br>
                    <button onclick="updateBal('${child.key}','${d.uid}',${d.amount})" style="background:#ffd700; border:none; padding:10px; border-radius:5px; cursor:pointer;">Approve & Add Balance</button>
                </div>`;
            }
        });
    });

    window.updateBal = async (key, uid, amt) => {
        const s = await get(ref(db, `users/${uid}/balance`));
        const newBal = (s.val() || 0) + parseFloat(amt);
        await update(ref(db, `users/${uid}`), { balance: newBal });
        await update(ref(db, `requests/${key}`), { status: 'approved' });
        alert("Balance Updated!");
    };
</script>
</body>
</html>
