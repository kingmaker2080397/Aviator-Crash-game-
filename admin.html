<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Admin</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="admin-container">
        <h1>Aviator Admin Panel</h1>
        <div class="controls">
            <button id="start-game">Start Game</button>
            <button id="crash-game">Crash Game</button>
            <div>
                <label for="crash-at">Crash At:</label>
                <input id="crash-at" type="number" value="10" step="0.1">
            </div>
        </div>
        <div class="stats">
            <h2>Game Stats</h2>
            <p>Total Bets: <span id="total-bets">0</span></p>
            <p>Total Payout: <span id="total-payout">0</span></p>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
