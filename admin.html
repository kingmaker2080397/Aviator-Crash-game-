<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustCraze Admin Panel</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #fafafa; }
    input, textarea { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
    .btn { background: #0D47A1; color: white; border: none; padding: 12px 15px; cursor: pointer; border-radius: 4px; width: 100%; }
    .btn:hover { background: #0a3a82; }
    #status { margin-top: 15px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>JustCraze.pk - Admin Panel 🔐</h2>
  <div id="loginDiv">
    <p>Products add karne ke liye login karo:</p>
    <button id="adminLoginBtn" class="btn">Login with Google</button>
  </div>

  <div id="adminDiv" style="display:none;">
    <h3>Add New Product</h3>
    <input type="text" id="title" placeholder="Product Title - Jaise: Tadakta T-Shirt">
    <input type="number" id="price" placeholder="Price Rs. - Jaise: 999">
    <input type="text" id="imageUrl" placeholder="Image URL - Imgur ya koi direct link">
    <textarea id="desc" rows="3" placeholder="Description"></textarea>
    <button class="btn" onclick="addProduct()">Add Product to Store</button>
    <p id="status"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // TUMHARI FIREBASE CONFIG ADD KAR DI HAI
    const firebaseConfig = {
      apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
      authDomain: "kingmaker-crash.firebaseapp.com",
      databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
      projectId: "kingmaker-crash",
      storageBucket: "kingmaker-crash.firebasestorage.app",
      messagingSenderId: "327400668393",
      appId: "1:327400668393:web:0d02a340b9f5603f524478",
      measurementId: "G-LVVD55RDQV"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    document.getElementById('adminLoginBtn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('adminDiv').style.display = 'block';
      }
    });

    window.addProduct = async () => {
      const title = document.getElementById('title').value;
      const price = Number(document.getElementById('price').value);
      const imageUrl = document.getElementById('imageUrl').value;
      const desc = document.getElementById('desc').value;
      const statusEl = document.getElementById('status');

      if (!title || !price || !imageUrl) {
        statusEl.innerText = "Title, Price aur Image URL zaroori hai!";
        statusEl.style.color = 'red';
        return;
      }

      try {
        await addDoc(collection(db, "products"), {
          title, price, imageUrl, desc,
          createdAt: serverTimestamp()
        });
        statusEl.innerText = "Product added successfully! ✅ Ab index.html pe check karo.";
        statusEl.style.color = 'green';
        document.getElementById('title').value = '';
        document.getElementById('price').value = '';
        document.getElementById('imageUrl').value = '';
        document.getElementById('desc').value = '';
      } catch (e) {
        statusEl.innerText = "Error: " + e.message;
        statusEl.style.color = 'red';
      }
    };
  </script>
</body>
</html>
