<!DOCTYPE html>
<html>
<head><title>Admin Control</title></head>
<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">
    <h2>Admin Control Panel</h2>
    <div id="reqList">Loading requests...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Same Config */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'requests'), (snap) => {
        const div = document.getElementById("reqList");
        div.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            if(d.status === 'pending') {
                div.innerHTML += `
                <div style="background:#222; padding:15px; margin-bottom:10px; border-radius:10px;">
                    User: ${d.email} | Amount: <b>Rs.${d.amount}</b>
                    <button onclick="updateBal('${child.key}', '${d.uid}', ${d.amount}, 'plus')" style="background:green; color:white;">Approve (+)</button>
                    <button onclick="updateBal('${child.key}', '${d.uid}', ${d.amount}, 'minus')" style="background:red; color:white;">Reject/Minus (-)</button>
                </div>`;
            }
        });
    });

    window.updateBal = async (key, uid, amt, action) => {
        const balRef = ref(db, `users/${uid}/balance`);
        const snapshot = await get(balRef);
        let currentBal = snapshot.val() || 0;

        let newBal = (action === 'plus') ? (currentBal + parseFloat(amt)) : (currentBal - parseFloat(amt));
        
        await update(ref(db, `users/${uid}`), { balance: newBal });
        await update(ref(db, `requests/${key}`), { status: 'completed' });
        alert("Balance Updated!");
    };
</script>
</body>
</html>
