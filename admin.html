<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;padding:20px;text-align:center}
.box{background:#0b1018;border:1px solid #b8860b;padding:20px;border-radius:12px;margin:10px 0}
input,button,select{width:100%;padding:14px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;font-size:16px}
button{background:#ffd700;color:#000;font-weight:900}
</style>
</head>
<body>
<div class="box">
<h1>⚙️ ADMIN PANEL</h1>
<h3>Deposit Info Set Karo</h3>
<select id="payType">
  <option value="JazzCash">JazzCash</option>
  <option value="EasyPaisa">EasyPaisa</option>
  <option value="Bank">Bank Transfer</option>
</select>
<input id="payNumber" placeholder="Account Number: 03442585087" type="tel">
<input id="payName" placeholder="Account Name: Abubakar">
<button onclick="savePaymentInfo()">SAVE DEPOSIT INFO</button>
<button onclick="location.href='./index.html'" style="background:#555">BACK TO GAME</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,set,get}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",authDomain:"kingmaker-crash.firebaseapp.com",databaseURL:"https://kingmaker-crash-default-rtdb.firebaseio.com",projectId:"kingmaker-crash",storageBucket:"kingmaker-crash.firebasestorage.app",messagingSenderId:"327400668393",appId:"1:327400668393:web:0d02a340b9f5603f524478"});
const auth=getAuth(app),db=getDatabase(app);

onAuthStateChanged(auth,async u=>{
  if(!u)return location.replace("./login.html");
  // Purana data load karo
  const snap = await get(ref(db,'admin/payment_info'));
  if(snap.exists() && typeof snap.val() === 'object'){
    document.getElementById('payType').value = snap.val().type || 'JazzCash';
    document.getElementById('payNumber').value = snap.val().number || '';
    document.getElementById('payName').value = snap.val().name || '';
  }
});

window.savePaymentInfo=async()=>{
  let type = document.getElementById('payType').value;
  let number = document.getElementById('payNumber').value.trim();
  let name = document.getElementById('payName').value.trim();

  if(!number ||!name) return Swal.fire("Error","Number aur Name dono daalo","error");

  await set(ref(db,'admin/payment_info'),{
    type: type,
    number: number,
    name: name
  });

  Swal.fire("Saved!","Deposit info sab mobiles pe update ho gaya","success");
};
</script>
</body>
</html>
