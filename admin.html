<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;padding:20px;}
.box{background:#0b1018;border:1px solid #b8860b;padding:20px;border-radius:12px;margin:15px 0}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;}
button{background:#ffd700;color:#000;font-weight:900;cursor:pointer}
</style>
</head>
<body>
<h1>⚙️ ADMIN PANEL</h1>

<div class="box">
  <h3>💰 Deposit Info Set Karo</h3>
  <select id="payType">
    <option value="JazzCash">JazzCash</option>
    <option value="EasyPaisa">EasyPaisa</option>
  </select>
  <input id="payNumber" placeholder="Account Number">
  <input id="payName" placeholder="Account Name">
  <button onclick="savePaymentInfo()">SAVE DEPOSIT INFO</button>
  <p id="currentInfo" style="font-size:12px; color:#999">Loading current info...</p>
</div>

<div class="box">
  <h3>🎮 Game Controls</h3>
  <p>Safe Mode: <b id="safeStatus">...</b></p>
  <button onclick="toggleSafe(true)" style="background:#10b981">SAFE ON</button>
  <button onclick="toggleSafe(false)" style="background:#ef4444">SAFE OFF</button>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getDatabase,ref,onValue,set}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",authDomain:"kingmaker-crash.firebaseapp.com",databaseURL:"https://kingmaker-crash-default-rtdb.firebaseio.com",projectId:"kingmaker-crash",storageBucket:"kingmaker-crash.firebasestorage.app",messagingSenderId:"327400668393",appId:"1:327400668393:web:0d02a340b9f5603f524478"});
const db=getDatabase(app);

// Load Current Data
onValue(ref(db,'admin'), s => {
  const data = s.val();
  if(data){
    if(data.payment_info){
       document.getElementById('currentInfo').innerText = `Current: ${data.payment_info.type} - ${data.payment_info.number}`;
    }
    document.getElementById('safeStatus').innerText = data.safe_mode ? "ON (🟢)" : "OFF (🔴)";
  }
});

window.savePaymentInfo = async () => {
  const type = document.getElementById('payType').value;
  const number = document.getElementById('payNumber').value;
  const name = document.getElementById('payName').value;
  if(!number || !name) return alert("Fill all fields");
  
  await set(ref(db, 'admin/payment_info'), { type, number, name });
  Swal.fire("Success", "Payment Info Updated!", "success");
};

window.toggleSafe = async (val) => {
  await set(ref(db, 'admin/safe_mode'), val);
  Swal.fire("Updated", `Safe Mode is now ${val ? 'ON' : 'OFF'}`, "info");
};
</script>
</body>
</html>
