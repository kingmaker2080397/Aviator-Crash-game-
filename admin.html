<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel - Kingmaker</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;padding:20px;margin:0}
.box{background:#0b1018;border:1px solid #b8860b;padding:20px;border-radius:12px;margin:15px 0}
h1{color:#ffd700;text-align:center}
h3{color:#ffd700;margin:10px 0}
input,button,select{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;font-size:16px}
button{background:#ffd700;color:#000;font-weight:900;cursor:pointer}
.tab{display:flex;gap:8px;margin:20px 0}
.tab button{flex:1;background:#000;color:#999}
.tab button.active{background:#ffd700;color:#000}
.req{background:#111;padding:12px;border-radius:8px;margin:8px 0;border-left:4px solid #ffd700}
.green{border-left-color:#10b981}
.red{border-left-color:#ef4444}
.small{font-size:12px;color:#999}
.flex{display:flex;gap:8px}
.flex button{flex:1}
</style>
</head>
<body>
<h1>⚙️ ADMIN PANEL</h1>

<div class="tab">
<button id="tab1" class="active" onclick="showTab(1)">DEPOSIT INFO</button>
<button id="tab2" onclick="showTab(2)">REQUESTS</button>
<button id="tab3" onclick="showTab(3)">CONTROLS</button>
</div>

<div id="box1" class="box">
<h3>💰 Deposit Info Set Karo</h3>
<select id="payType">
  <option value="JazzCash">JazzCash</option>
  <option value="EasyPaisa">EasyPaisa</option>
  <option value="Bank">Bank Transfer</option>
</select>
<input id="payNumber" placeholder="Account Number" type="tel">
<input id="payName" placeholder="Account Name">
<button onclick="savePaymentInfo()">SAVE DEPOSIT INFO</button>
<div class="small" style="margin-top:10px">Current: <span id="currentInfo">Loading...</span></div>
</div>

<div id="box2" class="box" style="display:none">
<h3>📋 Deposit/Withdraw Requests</h3>
<div id="reqList">Loading...</div>
</div>

<div id="box3" class="box" style="display:none">
<h3>🎮 Game Controls</h3>
<p>Safe Mode: <b id="safeStatus">Loading...</b></p>
<div class="flex">
  <button onclick="toggleSafe(true)" style="background:#10b981">SAFE ON</button>
  <button onclick="toggleSafe(false)" style="background:#ef4444">SAFE OFF</button>
</div>

<h3 style="margin-top:20px">🎯 Next Result Set Karo</h3>
<input id="nextResult" type="number" placeholder="Next Win Amount">
<button onclick="setNextResult()">SET NEXT RESULT</button>
<div class="small">Current: <span id="currentResult">None</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
  authDomain: "kingmaker-crash.firebaseapp.com",
  databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
  projectId: "kingmaker-crash",
  storageBucket: "kingmaker-crash.firebasestorage.app",
  messagingSenderId: "327400668393",
  appId: "1:327400668393:web:0d02a340b9f5603f524478"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Data Loading
onValue(ref(db, 'admin'), (s) => {
  const d = s.val();
  if (d) {
    if (d.payment_info) {
      document.getElementById('currentInfo').innerText = `${d.payment_info.type}: ${d.payment_info.number} | ${d.payment_info.name}`;
      // In fields ko auto-fill nahi kar rahe taaki admin ko fresh type karne mein asani ho
    }
    document.getElementById('safeStatus').innerText = d.safe_mode ? 'ON 🟢' : 'OFF 🔴';
    document.getElementById('currentResult').innerText = d.next_result || 'None';
  }
});

// Requests Loading
onValue(ref(db, 'requests'), s => {
  let html = '';
  if (s.exists()) {
    s.forEach(c => {
      let r = { key: c.key, ...c.val() };
      let cls = r.status === 'approved' ? 'green' : r.status === 'rejected' ? 'red' : '';
      html += `<div class="req ${cls}">
        <b>${r.type?.toUpperCase()}</b> - Rs.${r.amount}<br>
        <div class="small">${r.email} | ${r.status}</div>
        ${r.status === 'pending' ? `<div class="flex"><button onclick="approveReq('${r.key}',${r.amount},'${r.uid}','${r.type}')" style="background:#10b981">OK</button></div>` : ''}
      </div>`;
    });
  }
  document.getElementById('reqList').innerHTML = html || 'No requests';
});

// Functions
window.showTab = n => {
  for (let i = 1; i <= 3; i++) {
    document.getElementById('box' + i).style.display = n === i ? 'block' : 'none';
    document.getElementById('tab' + i).classList.toggle('active', n === i);
  }
};

window.savePaymentInfo = async () => {
  const type = document.getElementById('payType').value;
  const number = document.getElementById('payNumber').value.trim();
  const name = document.getElementById('payName').value.trim();
  if (!number || !name) return Swal.fire("Error", "Details fill karein", "error");
  await set(ref(db, 'admin/payment_info'), { type, number, name });
  Swal.fire("Saved!", "Deposit Info Live Ho Gayi", "success");
};

window.toggleSafe = (v) => {
  set(ref(db, 'admin/safe_mode'), !!v);
  Swal.fire("Done!", `Safe Mode ${v ? 'ON' : 'OFF'}`, "success");
};

window.setNextResult = async () => {
  const v = document.getElementById('nextResult').value;
  if (!v) return;
  await set(ref(db, 'admin/next_result'), parseFloat(v));
  document.getElementById('nextResult').value = '';
  Swal.fire("Set!", "Next result fixed", "success");
};
</script>
</body>
</html>
