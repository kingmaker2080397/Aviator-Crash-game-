<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JustCraze Admin - ImgBB Upload</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
.container { max-width: 1200px; margin: auto; }
.glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1); padding: 25px; margin-bottom: 20px; }
    h2, h3 { color: white; margin-bottom: 15px; font-weight: 600; }
    h2 { font-size: 28px; text-align: center; }
    input, textarea { width: 100%; padding: 12px 15px; margin: 8px 0; background: rgba(255, 255, 255, 0.2); border: none; border-radius: 10px; color: white; font-size: 14px; outline: none; }
    input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.7); }
    input[type="file"] { background: rgba(255,255,255,0.1); padding: 10px; cursor: pointer; }
.btn { background: rgba(255, 61, 0, 0.8); color: white; border: none; padding: 12px 25px; border-radius: 10px; cursor: pointer; font-weight: 500; transition: 0.3s; }
.btn:hover { background: rgba(255, 61, 0, 1); transform: translateY(-2px); }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.preview { width: 100px; height: 100px; object-fit: cover; border-radius: 10px; margin: 10px 0; display: none; }
    #status { margin: 15px 0; font-weight: 500; color: #fff; }
.item { background: rgba(255, 255, 255, 0.15); padding: 15px; margin: 10px 0; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; color: white; }
.item img { width: 50px; height: 50px; object-fit: cover; border-radius: 8px; margin-right: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="glass">
      <h2>JustCraze.pk Admin - Photo Upload 🔐</h2>
      <div id="loginDiv">
        <button id="adminLoginBtn" class="btn">Login with Google</button>
      </div>

      <div id="adminDiv" style="display:none;">
        <h3>Add New Product</h3>
        <input type="text" id="title" placeholder="Product Title">
        <input type="number" id="price" placeholder="Price Rs.">
        <input type="number" id="stock" placeholder="Stock Quantity">

        <label style="color:white;display:block;margin-top:10px;">Photo Choose Karo:</label>
        <input type="file" id="imageFile" accept="image/*" onchange="previewImage()">
        <img id="preview" class="preview">

        <textarea id="desc" rows="2" placeholder="Description"></textarea>
        <button class="btn" onclick="addProduct()" id="addBtn">Add Product to Store</button>
        <p id="status"></p>
        <h3>All Products</h3>
        <div id="productList"><p>Loading...</p></div>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
      authDomain: "kingmaker-crash.firebaseapp.com",
      projectId: "kingmaker-crash",
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // TUMHARI IMGBB API KEY
    const IMGBB_API_KEY = "a25b5bea8eb38a1ecf4f04154d85a4bf";

    document.getElementById('adminLoginBtn').onclick = () => signInWithPopup(auth, provider);

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('adminDiv').style.display = 'block';
        loadProducts();
      }
    });

    window.previewImage = () => {
      const file = document.getElementById('imageFile').files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (e) => {
          document.getElementById('preview').src = e.target.result;
          document.getElementById('preview').style.display = 'block';
        };
        reader.readAsDataURL(file);
      }
    };

    window.addProduct = async () => {
      const title = document.getElementById('title').value;
      const price = Number(document.getElementById('price').value);
      const stock = Number(document.getElementById('stock').value) || 0;
      const desc = document.getElementById('desc').value;
      const file = document.getElementById('imageFile').files[0];
      const statusEl = document.getElementById('status');
      const addBtn = document.getElementById('addBtn');

      if (!title ||!price ||!file) {
        statusEl.innerText = "Title, Price aur Photo zaroori hai!";
        return;
      }

      addBtn.disabled = true;
      addBtn.innerText = "Uploading...";
      statusEl.innerText = "Photo tumhare ImgBB pe upload ho rahi hai...";

      try {
        const base64 = await toBase64(file);
        const formData = new FormData();
        formData.append('image', base64.split(',')[1]);

        const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
          method: 'POST',
          body: formData
        });

        const data = await res.json();
        if (!data.success) throw new Error("Upload failed");

        const imageUrl = data.data.url;

        await addDoc(collection(db, "products"), {
          title, price, stock, imageUrl, desc, createdAt: serverTimestamp()
        });

        statusEl.innerText = "Product added! ✅ Photo ImgBB pe save ho gayi";
        document.getElementById('title').value = '';
        document.getElementById('price').value = '';
        document.getElementById('stock').value = '';
        document.getElementById('desc').value = '';
        document.getElementById('imageFile').value = '';
        document.getElementById('preview').style.display = 'none';
        addBtn.disabled = false;
        addBtn.innerText = "Add Product to Store";
        loadProducts();

      } catch (e) {
        statusEl.innerText = "Error: " + e.message;
        addBtn.disabled = false;
        addBtn.innerText = "Add Product to Store";
      }
    };

    const toBase64 = file => new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result);
      reader.onerror = error => reject(error);
    });

    async function loadProducts() {
      const querySnapshot = await getDocs(collection(db, "products"));
      const listDiv = document.getElementById('productList');
      listDiv.innerHTML = '';
      if (querySnapshot.empty) {
        listDiv.innerHTML = '<p style="color:white;">Koi product nahi hai abhi.</p>';
        return;
      }
      querySnapshot.forEach((docSnap) => {
        const p = docSnap.data();
        listDiv.innerHTML += `
          <div class="item">
            <div style="display:flex; align-items:center;">
              <img src="${p.imageUrl}" alt="${p.title}">
              <div><b>${p.title}</b><br>Rs. ${p.price} | Stock: ${p.stock || 0}</div>
            </div>
            <button class="btn" style="background:rgba(211,47,47,0.8)" onclick="deleteProduct('${docSnap.id}')">Delete</button>
          </div>
        `;
      });
    }

    window.deleteProduct = async (id) => {
      if (confirm("Pakka delete karna hai?")) {
        await deleteDoc(doc(db, "products", id));
        document.getElementById('status').innerText = "Product deleted! 🗑️";
        loadProducts();
      }
    };
  </script>
</body>
</html>
