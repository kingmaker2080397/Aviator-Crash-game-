<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Master Admin - Kingmaker</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white p-10">
    <h1 class="text-yellow-500 text-2xl font-black mb-6 border-b border-yellow-500 pb-2 text-center">🕹️ MASTER CONTROL</h1>
    
    <div class="bg-gray-900 p-8 rounded-3xl border border-gray-700 mb-8 text-center">
        <p class="text-gray-400 uppercase text-xs font-bold">Live Multiplier</p>
        <h2 id="live-mult" class="text-7xl font-black text-green-500">1.00x</h2>
    </div>

    <div class="flex flex-col gap-4">
        <button onclick="startGame()" class="bg-green-600 py-6 rounded-2xl font-black text-2xl shadow-xl active:scale-95">🚀 LAUNCH ROCKET</button>
        <button onclick="forceCrash()" class="bg-red-600 py-6 rounded-2xl font-black text-2xl shadow-xl active:scale-95">💥 FORCE CRASH</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "APNI_API_KEY_YAHAN_DALEN",
            authDomain: "kingmaker-crash.firebaseapp.com",
            databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
            projectId: "kingmaker-crash",
            appId: "APNI_APP_ID_YAHAN_DALEN"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let gameInterval;
        let m = 1.0;

        window.startGame = () => {
            clearInterval(gameInterval);
            m = 1.0;
            update(ref(db, 'gameSystem'), { state: "START", multiplier: 1.0 });
            gameInterval = setInterval(() => {
                m += 0.03; 
                update(ref(db, 'gameSystem'), { multiplier: m });
                document.getElementById('live-mult').innerText = m.toFixed(2) + "x";
            }, 100);
        };

        window.forceCrash = () => {
            clearInterval(gameInterval);
            update(ref(db, 'gameSystem'), { state: "CRASHED", lastCrash: m });
        };
    </script>
</body>
</html>
