<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Admin Panel</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
body{background:#05070a;color:#fff;font-family:sans-serif;padding:20px;margin:0}
.box{background:#0b1018;border:1px solid #b8860b;padding:20px;border-radius:12px;margin:10px 0}
h1{color:#ffd700;text-align:center}
input,select,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:1px solid #b8860b;background:#000;color:#fff;font-size:16px}
button{background:#ffd700;color:#000;font-weight:900;cursor:pointer}
.req{background:#000;padding:10px;margin:8px 0;border-radius:8px;display:flex;justify-content:space-between;align-items:center}
.btn{padding:8px 12px;border:none;border-radius:6px;font-weight:700;cursor:pointer}
.ok{background:#10b981;color:#fff}
.no{background:#ef4444;color:#fff}
</style>
</head>
<body>
<div class="box">
<h1>👑 ADMIN PANEL</h1>
<p id="email" style="text-align:center;color:#999"></p>
<button onclick="logout()" style="background:#ef4444">LOGOUT</button>
</div>

<div class="box">
<h3>🎯 Rig Next Spin</h3>
<select id="rigVal">
<option value="">Random</option>
<option value="2">2</option><option value="5">5</option>
<option value="20">20</option><option value="100">100</option>
<option value="1000">1000</option><option value="5000">5000</option>
</select>
<button onclick="setRig()">LOCK</button>
</div>

<div class="box">
<h3>🛡️ Safe Mode: <span id="safe">OFF</span></h3>
<button onclick="toggleSafe()">TOGGLE SAFE MODE</button>
</div>

<div class="box">
<h3>📥 Requests</h3>
<div id="reqList">Loading...</div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import{getDatabase,ref,set,onValue,update,get}from"https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const app=initializeApp({apiKey:"AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",authDomain:"kingmaker-crash.firebaseapp.com",databaseURL:"https://kingmaker-crash-default-rtdb.firebaseio.com",projectId:"kingmaker-crash",storageBucket:"kingmaker-crash.firebasestorage.app",messagingSenderId:"327400668393",appId:"1:327400668393:web:0d02a340b9f5603f524478"});
const auth=getAuth(app),db=getDatabase(app);
const ADMINS=["abu143un@gmail.com"];
let safeMode=false;

onAuthStateChanged(auth,u=>{
if(!u)return location.replace("./login.html");
if(!ADMINS.includes(u.email.toLowerCase()))return Swal.fire("Access Denied","Your: "+u.email,"error").then(()=>signOut(auth).then(()=>location.replace("./login.html")));
document.getElementById('email').innerText=u.email;
loadReq();loadSafe();
});

function loadSafe(){onValue(ref(db,'admin/safe_mode'),s=>{safeMode=s.val()===true;document.getElementById('safe').innerText=safeMode?'ON':'OFF';document.getElementById('safe').style.color=safeMode?'#10b981':'#ef4444';});}

window.setRig=async()=>{await set(ref(db,'admin/next_result'),document.getElementById('rigVal').value||null);Swal.fire("Locked!","Next spin rigged","success")};
window.toggleSafe=async()=>{await set(ref(db,'admin/safe_mode'),!safeMode);Swal.fire("Safe Mode",!safeMode?"ON":"OFF","success")};
window.logout=()=>signOut(auth).then(()=>location.replace("./login.html"));

function loadReq(){
onValue(ref(db,'requests'),s=>{
let h='';if(!s.exists()){document.getElementById('reqList').innerHTML='No requests';return}
s.forEach(c=>{let d=c.val();if(d.status==='pending')h+=`<div class="req"><div><b>${d.type}</b> - Rs.${d.amount}<br><small>${d.email}</small></div><div><button class="btn ok" onclick="appReq('${c.key}','${d.uid}',${d.amount},'${d.type}')">✓</button> <button class="btn no" onclick="rejReq('${c.key}','${d.uid}',${d.amount},'${d.type}')">✕</button></div></div>`});
document.getElementById('reqList').innerHTML=h||'No pending';
});
}

window.appReq=async(id,uid,amt,type)=>{
if(type==='Win'||type==='deposit'){let s=await get(ref(db,`users/${uid}/balance`));await update(ref(db,`users/${uid}`),{balance:(s.val()||0)+amt})}
await update(ref(db,`requests/${id}`),{status:'approved'});
Swal.fire("Approved!","","success");
};

window.rejReq=async(id,uid,amt,type)=>{
if(type==='withdraw'){let s=await get(ref(db,`users/${uid}/balance`));await update(ref(db,`users/${uid}`),{balance:(s.val()||0)+amt})}
await update(ref(db,`requests/${id}`),{status:'rejected'});
Swal.fire("Rejected!","","success");
};
</script>
</body>
                                  </html>
