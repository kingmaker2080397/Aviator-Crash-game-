<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Control - Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #fff; font-family: sans-serif; }
        .card { background: #111; border: 1px solid #222; border-radius: 1.5rem; padding: 1.2rem; margin-bottom: 1rem; }
        input, select { background: #000; border: 1px solid #333; padding: 0.6rem; border-radius: 0.8rem; outline: none; color: #fff; width: 100%; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto">
        <h1 class="text-xl font-black text-red-600 mb-4 text-center italic">ADMIN CONTROL</h1>

        <div class="card text-center">
            <h2 id="live-mult" class="text-6xl font-black text-green-500 mb-4">1.00x</h2>
            <input id="crash-limit" type="number" step="0.1" value="2.0" class="text-center text-xl text-yellow-500 mb-4">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="startFlight()" class="bg-green-600 py-4 rounded-xl font-black uppercase">Start</button>
                <button onclick="crashNow()" class="bg-red-600 py-4 rounded-xl font-black uppercase">Crash</button>
            </div>
        </div>

        <div class="card">
            <h3 class="text-yellow-500 font-bold mb-3 text-xs uppercase">Deposit Number</h3>
            <select id="set-method" class="mb-2"><option value="EasyPaisa">EasyPaisa</option><option value="JazzCash">JazzCash</option></select>
            <input id="set-number" type="text" placeholder="Number" class="mb-2">
            <button onclick="updatePay()" class="w-full bg-yellow-600 py-2 rounded-xl font-bold text-black text-xs uppercase">Update App</button>
        </div>

        <div id="requests" class="space-y-3">
            <h3 class="text-xs font-bold text-gray-500 uppercase ml-2">Pending Tasks</h3>
            <div id="task-list"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, update, onValue, remove, get } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBBperRVYyxnUITX92tuS8MSU5A-JKqCsM",
            authDomain: "kingmaker-crash.firebaseapp.com",
            databaseURL: "https://kingmaker-crash-default-rtdb.firebaseio.com",
            projectId: "kingmaker-crash",
            storageBucket: "kingmaker-crash.firebasestorage.app",
            messagingSenderId: "327400668393",
            appId: "1:327400668393:web:0d02a340b9f5603f524478"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let m = 1.0, interval, flying = false;

        window.startFlight = () => {
            if(flying) return; flying = true; m = 1.0;
            const lim = parseFloat(document.getElementById('crash-limit').value);
            update(ref(db, 'gameSystem'), { state: "START", multiplier: 1.0 });
            interval = setInterval(() => {
                m += (m < 2 ? 0.03 : 0.07);
                if(m >= lim) crashNow();
                else { update(ref(db, 'gameSystem'), { multiplier: m }); document.getElementById('live-mult').innerText = m.toFixed(2) + "x"; }
            }, 100);
        };

        window.crashNow = () => { clearInterval(interval); flying = false; update(ref(db, 'gameSystem'), { state: "CRASHED", lastCrash: m }); update(ref(db, 'bets'), null); };
        window.updatePay = () => update(ref(db, 'adminSettings/paymentInfo'), { method: document.getElementById('set-method').value, number: document.getElementById('set-number').value });

        onValue(ref(db, 'depositRequests'), (s) => {
            const list = document.getElementById('task-list'); list.innerHTML = "";
            const data = s.val(); for(let k in data) {
                list.innerHTML += `<div class="bg-black p-3 rounded-xl mb-2 text-xs border border-gray-800">
                    <p class="text-blue-400">${data[k].email}</p>
                    <p>Deposit: <b>PKR ${data[k].amount}</b> | TID: ${data[k].tid}</p>
                    <button onclick="approveDep('${k}','${data[k].uid}',${data[k].amount})" class="bg-green-600 px-3 py-1 rounded mt-2">Approve</button>
                </div>`;
            }
        });

        window.approveDep = async (k, u, a) => {
            const s = await get(ref(db, `users/${u}/balance`));
            update(ref(db, `users/${u}`), { balance: (s.val() || 0) + a });
            remove(ref(db, `depositRequests/${k}`));
        };
    </script>
</body>
        </html>
