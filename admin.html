<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="background:#000; color:#fff; font-family:sans-serif; padding:20px;">
    <h1>Admin Dashboard</h1>
    <div id="requestList">Looking for requests...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Paste Config Again */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'requests'), (snapshot) => {
        const list = document.getElementById('requestList');
        list.innerHTML = "";
        snapshot.forEach(child => {
            const data = child.val();
            if(data.status === 'pending') {
                list.innerHTML += `
                    <div style="border:1px solid #333; padding:15px; margin-bottom:10px; border-radius:10px;">
                        User: ${data.email} | Jeeta: <b>Rs. ${data.amount}</b>
                        <button onclick="approve('${child.key}', '${data.uid}', ${data.amount})" style="background:green; color:white; padding:10px; margin-left:20px; cursor:pointer;">Approve</button>
                    </div>`;
            }
        });
    });

    window.approve = (reqId, uid, amt) => {
        const balRef = ref(db, `users/${uid}/balance`);
        runTransaction(balRef, (curr) => (curr || 0) + parseFloat(amt))
        .then(() => {
            update(ref(db, `requests/${reqId}`), { status: 'approved' });
            alert("Balance Updated Successfully!");
        });
    };
</script>
</body>
</html>
