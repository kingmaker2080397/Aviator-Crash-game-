<!DOCTYPE html>
<html>
<head><title>Admin Panel</title></head>
<body style="background:#111; color:white; font-family:sans-serif; padding:20px;">
    <h1>Admin Dashboard</h1>
    <div id="list">Loading...</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, onValue, update, get } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = { /* Paste same config as above */ };
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    onValue(ref(db, 'requests'), (snap) => {
        const listDiv = document.getElementById('list');
        listDiv.innerHTML = "";
        snap.forEach(child => {
            const d = child.val();
            if(d.status === 'pending') {
                listDiv.innerHTML += `
                <div style="background:#222; padding:15px; margin-bottom:10px; border-radius:10px;">
                    User: ${d.email} | Jeeta: <b>Rs.${d.amount}</b>
                    <br><br>
                    <button onclick="controlBal('${child.key}', '${d.uid}', ${d.amount}, 'plus')" style="background:green; color:white; padding:10px;">Approve (+)</button>
                    <button onclick="controlBal('${child.key}', '${d.uid}', ${d.amount}, 'minus')" style="background:red; color:white; padding:10px;">Reject/Deduct (-)</button>
                </div>`;
            }
        });
    });

    window.controlBal = async (reqKey, uid, amt, type) => {
        const balRef = ref(db, `users/${uid}/balance`);
        const snap = await get(balRef);
        let current = snap.val() || 0;

        let finalBal = (type === 'plus') ? (current + parseFloat(amt)) : (current - parseFloat(amt));
        
        await update(ref(db, `users/${uid}`), { balance: finalBal });
        await update(ref(db, `requests/${reqKey}`), { status: 'completed' });
        alert("Balance Updated!");
    };
</script>
</body>
</html>
